# Spark-on-Shelf example.
#
# Spins up MinIO (origin) + iceberg-rest (catalog) + shelfd (cache),
# runs a one-shot seed that writes a 1M-row partitioned Iceberg table
# into MinIO, then a one-shot `bench` container that runs a Spark
# query twice — cold, then warm — and prints the cache savings.
#
# Spark talks S3 to `shelfd:9092` (signature-agnostic shim) for every
# byte of every Parquet file Iceberg points at, and Iceberg metadata
# to `iceberg-rest:8181`. shelfd's origin is `minio:9000`, so every
# byte Spark reads is either served from Foyer DRAM (warm) or proxied
# to MinIO (cold).
#
# Self-contained: nothing outside `examples/spark/` is modified.
# `shelfd` is built from the repo root using the smoke harness's
# Dockerfile so this example tracks the workspace's source tree
# instead of pinning a published image — that keeps the example
# runnable while the OSS GHCR image is being made public.
# To pin a published image instead, override SHELFD_IMAGE:
#
#     SHELFD_IMAGE=ghcr.io/shelf-project/shelfd:0.1.0-preview-9 \
#         docker compose --profile bench up --build

name: shelf-spark-example

networks:
  shelf-spark:
    driver: bridge

volumes:
  minio-data:

services:
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: shelf-spark-minio
    networks: [shelf-spark]
    # No host port mappings: nothing on the host needs to reach
    # MinIO directly (Spark + shelfd talk to it on the bridge
    # network). Add `ports: ["127.0.0.1:19000:9000"]` here if you
    # want to poke MinIO from `mc` on the host.
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio-setup:
    image: minio/mc:latest
    container_name: shelf-spark-minio-setup
    networks: [shelf-spark]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -eu;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/warehouse;
      mc mb --ignore-existing local/shelfd-pin-list;
      echo 'buckets ready';
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: shelf-spark-iceberg-rest
    networks:
      shelf-spark:
        aliases:
          # `catalog` is the alias the bench container uses to reach
          # this service. The shorter alias (no hyphen) sidesteps a
          # quirk in iceberg-spark 1.8.1's REST URI parser that
          # mishandles `host-with-hyphen:port` and dispatches DNS
          # lookups to just the suffix after the hyphen — observed
          # 2026-04-28 with `http://iceberg-rest:8181` resolving to
          # host=`rest`. Other clients (PyIceberg, DuckDB, plain
          # Java URI.create) parse the same string correctly.
          - catalog
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    # Catalog only needs to be reachable from inside the bridge
    # network (Spark + the seeder). Bind to a host port from the
    # outside if you want to drive it from a notebook.
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8181"]
      interval: 3s
      timeout: 3s
      retries: 30

  seed:
    image: python:3.12-slim
    container_name: shelf-spark-seed
    networks: [shelf-spark]
    depends_on:
      iceberg-rest:
        condition: service_healthy
    working_dir: /seed
    volumes:
      - ./init:/seed:ro
    environment:
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      WAREHOUSE_BUCKET: warehouse
      ICEBERG_REST_URI: http://iceberg-rest:8181
      EVENTS_ROWS: "1000000"
      EVENTS_DAYS: "30"
    command: ["bash", "/seed/seed.sh"]

  shelfd:
    image: ${SHELFD_IMAGE:-shelf-spark-shelfd:local}
    build:
      context: ../..
      dockerfile: benchmarks/smoke/Dockerfile.shelfd
    container_name: shelf-spark-shelfd
    networks: [shelf-spark]
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./config/shelfd/shelfd.yaml:/etc/shelfd/shelfd.yaml:ro
    command: ["--config", "/etc/shelfd/shelfd.yaml"]
    ports:
      - "127.0.0.1:9590:9090"  # data-plane (/metrics, /healthz, /admin)
      - "127.0.0.1:9592:9092"  # S3-compat read+write shim
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/healthz || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 30

  bench:
    image: tabulario/spark-iceberg:3.5.5_1.8.1
    container_name: shelf-spark-bench
    networks: [shelf-spark]
    depends_on:
      shelfd:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    working_dir: /work
    volumes:
      - ./bench/bench.py:/work/bench.py:ro
      - ./bench/run-bench.sh:/work/run-bench.sh:ro
      - ./spark-warmup.sql:/work/spark-warmup.sql:ro
      - ./spark-bench.sql:/work/spark-bench.sql:ro
    environment:
      ICEBERG_REST_URI: http://catalog:8181
      SHELFD_S3_ENDPOINT: http://shelfd:9092
      SHELFD_METRICS_URL: http://shelfd:9090/metrics
      SHELFD_ADMIN_URL:   http://shelfd:9090/admin
      WAREHOUSE_BUCKET: warehouse
      AWS_REGION: us-east-1
      # PySpark needs a writable HOME for ivy/cache dirs even though
      # we don't pull `--packages`. /tmp is the simplest writable
      # path in the spark-iceberg image.
      HOME: /tmp
    entrypoint: ["bash", "/work/run-bench.sh"]
    profiles: ["bench"]
