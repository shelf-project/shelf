# PyIceberg reference example for Shelf.
#
# Stack:
#   minio          - object store (S3 origin)
#   minio-setup    - one-shot bucket creation
#   iceberg-rest   - REST catalog (tabulario/iceberg-rest)
#   shelfd         - Shelf cache daemon, S3-compat read shim on :9092
#   seed           - one-shot, creates demo.events via PyIceberg
#   runner         - long-lived python:3.11-slim where bench.py runs

name: shelf-pyiceberg-example

networks:
  shelf-pyiceberg:
    driver: bridge

volumes:
  minio-data:

services:
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: pyiceberg-minio
    networks: [shelf-pyiceberg]
    ports:
      # Host ports are deliberately in a 272xx range so this example can run
      # alongside the smoke harness and sibling examples (duckdb, daft, polars,
      # spark, clickhouse, starrocks, ...) without colliding.
      - "127.0.0.1:27200:9000"
      - "127.0.0.1:27201:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio-setup:
    image: minio/mc:latest
    container_name: pyiceberg-minio-setup
    networks: [shelf-pyiceberg]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -eu;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/iceberg-warehouse;
      echo 'bucket ready';
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: pyiceberg-iceberg-rest
    networks: [shelf-pyiceberg]
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://iceberg-warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "127.0.0.1:27281:8181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8181"]
      interval: 3s
      timeout: 3s
      retries: 30

  shelfd:
    # Reuses the smoke harness Dockerfile (read-only build context, not modified).
    # Override with `SHELFD_IMAGE=ghcr.io/<owner>/shelfd:<tag>` to skip the build
    # and pull a published image instead.
    image: ${SHELFD_IMAGE:-shelf-pyiceberg-example/shelfd:local}
    build:
      context: ../..
      dockerfile: benchmarks/smoke/Dockerfile.shelfd
    container_name: pyiceberg-shelfd
    networks: [shelf-pyiceberg]
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./shelfd.yaml:/etc/shelfd/shelfd.yaml:ro
    command: ["--config", "/etc/shelfd/shelfd.yaml"]
    ports:
      - "127.0.0.1:27090:9090"   # data-plane: /healthz, /metrics, /stats
      - "127.0.0.1:27092:9092"   # S3-compat read shim
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/healthz || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 30

  seed:
    image: python:3.11-slim
    container_name: pyiceberg-seed
    networks: [shelf-pyiceberg]
    depends_on:
      iceberg-rest:
        condition: service_healthy
    working_dir: /work
    volumes:
      - ./:/work:ro
    environment:
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      ICEBERG_REST_URI: http://iceberg-rest:8181
      WAREHOUSE_BUCKET: iceberg-warehouse
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_ROOT_USER_ACTION: "ignore"
    command: >
      bash -c "
      set -eu;
      pip install --quiet --no-cache-dir -r /work/requirements.txt;
      python /work/init/seed.py;
      "

  runner:
    image: python:3.11-slim
    container_name: pyiceberg-runner
    networks: [shelf-pyiceberg]
    depends_on:
      shelfd:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    working_dir: /work
    volumes:
      - ./:/work
    environment:
      # PyIceberg / PyArrow point at shelfd, not at MinIO directly. The shim
      # is signature-agnostic, so any non-empty key/secret works.
      SHELF_ENDPOINT: http://shelfd:9092
      SHELFD_METRICS_URL: http://shelfd:9090/metrics
      ICEBERG_REST_URI: http://iceberg-rest:8181
      WAREHOUSE_BUCKET: iceberg-warehouse
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_ROOT_USER_ACTION: "ignore"
    command: >
      bash -c "
      set -eu;
      pip install --quiet --no-cache-dir -r /work/requirements.txt;
      touch /tmp/runner-ready;
      tail -f /dev/null
      "
    # Healthcheck makes the runner satisfy `compose up -d --wait` once pip
    # finishes; otherwise the wait would block forever on an idle tail.
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/runner-ready"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 5s
