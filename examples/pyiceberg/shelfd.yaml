# shelfd config for the PyIceberg reference example.
#
# DRAM-only, single-pod membership. The S3-compat read shim binds on
# 0.0.0.0:9092 — PyIceberg's `s3.endpoint` will point here.

node:
  id: pyiceberg-example-0

http:
  listen: 0.0.0.0:9090
  request_timeout: 30s

control:
  listen: 0.0.0.0:9091

origin:
  bucket: iceberg-warehouse
  endpoint_url: http://minio:9000
  region: us-east-1
  max_inflight: 64

pools:
  metadata:
    dram_bytes: 268435456        # 256 MiB
  rowgroup:
    dram_bytes: 268435456        # 256 MiB
    nvme_dir: /tmp/shelf-nvme
    nvme_bytes: 536870912        # 512 MiB (foyer NVMe pool feature-gated; ignored by default builds)

admission:
  size_threshold_bytes: 1073741824   # 1 GiB per ADR-0003
  pinned_bypass: true

membership:
  headless_service: shelfd
  dns_refresh: 5s

pin_list:
  bucket: iceberg-warehouse
  key: pin_list.json
  refresh_period: 15m
  enabled: false

head_lru_entries: 4096

observability: {}
