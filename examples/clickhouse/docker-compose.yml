# ClickHouse + Shelf S3 shim example.
#
# Topology:
#   minio          object store (bucket: warehouse)
#   iceberg-rest   pyiceberg-friendly REST catalog (used by the seed step only)
#   seed           one-shot pyiceberg writer that creates demo.events
#   shelfd         signature-agnostic S3 read shim on :9092
#   clickhouse     reads Iceberg via the iceberg() table function, with
#                  s3 endpoint pointed at shelfd
#
# ClickHouse only needs the table location in S3 (it walks Iceberg metadata
# directly), so iceberg-rest is *not* on its read path. The shim is the only
# thing ClickHouse talks to for object reads.
#
# Spin up:
#   bash run.sh
# Tear down:
#   docker compose down -v

name: shelf-clickhouse-example

networks:
  shelf-ch:
    driver: bridge

volumes:
  minio-data:

services:
  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: shelf-ch-minio
    networks: [shelf-ch]
    ports:
      - "127.0.0.1:9300:9000"
      - "127.0.0.1:9301:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 2s
      retries: 30

  minio-setup:
    image: minio/mc:latest
    container_name: shelf-ch-minio-setup
    networks: [shelf-ch]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -eu;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/warehouse;
      echo 'bucket warehouse ready';
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: shelf-ch-iceberg-rest
    networks: [shelf-ch]
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    ports:
      - "127.0.0.1:8381:8181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8181"]
      interval: 3s
      timeout: 3s
      retries: 30

  seed:
    image: python:3.12-slim
    container_name: shelf-ch-seed
    networks: [shelf-ch]
    depends_on:
      iceberg-rest:
        condition: service_healthy
    working_dir: /seed
    volumes:
      - ./init:/seed:ro
    environment:
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      WAREHOUSE_BUCKET: warehouse
      ICEBERG_REST_URI: http://iceberg-rest:8181
    command: ["bash", "/seed/seed.sh"]

  # shelfd S3 read shim. We build from the production Dockerfile at the
  # repo root so this example uses the same artifact CI publishes.
  # First build is ~5-10 min; subsequent builds reuse the layer cache.
  shelfd:
    build:
      context: ../..
      dockerfile: shelfd/Dockerfile
    container_name: shelf-ch-shelfd
    networks: [shelf-ch]
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./config/shelfd/shelfd.yaml:/etc/shelfd/shelfd.yaml:ro
    command: ["--config", "/etc/shelfd/shelfd.yaml"]
    ports:
      - "127.0.0.1:9390:9090"   # data plane (/healthz, /stats, /metrics)
      - "127.0.0.1:9392:9092"   # S3 read shim (ClickHouse points at this)

  clickhouse:
    # 24.12.4.49 is a confirmed Docker Hub tag; Iceberg + path-style auto-
    # detect on non-AWS hostnames work out of the box. 24.x is the minimum
    # for the iceberg() / icebergS3() table function with usable schema
    # evolution (24.12 added schema evolution; 24.1+ added time travel).
    image: clickhouse/clickhouse-server:24.12.4.49
    container_name: shelf-ch-clickhouse
    networks: [shelf-ch]
    depends_on:
      seed:
        condition: service_completed_successfully
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - ./config/clickhouse:/etc/clickhouse-server/config.d:ro
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9009:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 60
      start_period: 10s
