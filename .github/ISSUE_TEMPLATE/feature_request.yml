name: Feature request
description: Propose a new capability for Shelf
title: "feat: <short summary>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Larger proposals — anything that
        affects the public API, on-disk format, or operational model —
        should land an ADR under `agents/out/adr/` first; see
        `GOVERNANCE.md`.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What are you trying to do that is hard or impossible today?
        Describe the use case, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: |
        How would you like Shelf to behave? API shape, configuration,
        defaults, error modes — whatever is relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you considered and why you discarded them.
        It is fine to say "none" — but please think about it first.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Links to related issues, ADRs, prior art in other systems, or
        anything else that helps a maintainer evaluate the request.
