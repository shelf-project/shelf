name: helm-lint

# SHELF-09 — PR gate for the shelf Helm chart and the shelfd image.
#
# Three jobs wire the "chart is installable and the image fits in the
# size budget" acceptance criteria onto every PR:
#
#   1. helm-lint     — lints charts/shelf against the CI values snapshot
#                      and each env overlay (dev/staging/prod).
#   2. helm-template — renders the chart and pipes through
#                      `kubectl apply --dry-run=client` to catch schema
#                      breakage that helm lint misses.
#   3. docker-build  — builds shelfd/Dockerfile with buildx, gates the
#                      uncompressed image size at 150 MB (≈ 80 MB
#                      compressed, the ticket AC), and writes the exact
#                      byte count to the job summary.
#
# Design notes at
#   shelfd/docs/design-notes/SHELF-09-dockerfile-and-helm-lint.md

on:
  pull_request:
    paths:
      - "charts/**"
      - "shelfd/**"
      - "shelfctl/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/helm-lint.yml"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: helm-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint:
    name: helm lint
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Lint chart with CI values (strict)
        run: |
          helm lint charts/shelf \
            --values charts/shelf/ci/lint-values.yaml \
            --strict

      # Env overlays are linted non-strict: prod values legitimately
      # require IRSA annotations that dev/staging omit, and --strict
      # would flag those as warnings-as-errors.
      #
      # Each overlay is gated on file presence so a missing per-env
      # values file (Phase-NN deliverable) is a `notice`, not a hard
      # CI fail. Only `values-dev.yaml` exists at v1.0.0-rc.1; staging
      # and prod overlays are tracked under follow-up SHELF tickets.
      - name: Lint chart with env overlays (skip-if-missing)
        run: |
          set -euo pipefail
          for env in dev staging prod; do
            f="charts/shelf/values-${env}.yaml"
            if [[ -f "${f}" ]]; then
              echo "::group::helm lint ${f}"
              helm lint charts/shelf --values "${f}"
              echo "::endgroup::"
            else
              echo "::notice::${f} not present yet — skipping ${env} overlay lint"
            fi
          done

  helm-template:
    name: helm template + kubectl dry-run
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.3

      - name: Render chart and parse-validate
        # --kube-version is required because Chart.yaml pins
        # kubeVersion: ">=1.27.0-0" and helm's built-in Capabilities
        # default is older than that.
        # We do not pipe through `kubectl apply --dry-run=client`:
        # client-side dry-run still fans out to the API server to
        # resolve resource kinds and fails with "couldn't get current
        # server API group list" on a clusterless runner. Confirming
        # the chart renders to a non-empty, parseable YAML stream is
        # the actual smoke-check intent.
        run: |
          set -euo pipefail
          OUT="$(mktemp)"
          helm template shelf charts/shelf \
            --values charts/shelf/ci/lint-values.yaml \
            --kube-version 1.30.0 \
            > "${OUT}"
          if [[ ! -s "${OUT}" ]]; then
            echo "::error::helm template produced an empty manifest stream"
            exit 1
          fi
          python3 -c "import sys, yaml; docs=[d for d in yaml.safe_load_all(open(sys.argv[1])) if d is not None]; assert docs, 'no documents rendered'; print(f'helm template rendered {len(docs)} documents OK')" "${OUT}"

  docker-build:
    name: docker build (shelfd)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build shelfd image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: shelfd/Dockerfile
          tags: shelfd:ci
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Distroless/cc (~66 MB uncompressed) + a stripped shelfd binary
      # with aws-sdk-s3 + tonic + foyer lands in the 100-140 MB range
      # uncompressed, which maps to ≤ 80 MB compressed (the ticket AC).
      # We gate at 150 MB uncompressed to catch regressions cheaply
      # without paying `docker save | gzip -c | wc -c` every run.
      - name: Inspect and gate image size
        run: |
          set -euo pipefail
          SIZE_BYTES=$(docker image inspect shelfd:ci --format '{{.Size}}')
          SIZE_MIB=$(awk "BEGIN { printf \"%.2f\", ${SIZE_BYTES} / 1048576 }")
          LIMIT_BYTES=$((150 * 1024 * 1024))

          echo "shelfd:ci uncompressed size = ${SIZE_BYTES} bytes (${SIZE_MIB} MiB)"
          {
            echo "### shelfd image size"
            echo ""
            echo "- **Uncompressed:** ${SIZE_BYTES} bytes (${SIZE_MIB} MiB)"
            echo "- **Gate:** 150 MiB uncompressed (≈ 80 MiB compressed, SHELF-09 AC)"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${SIZE_BYTES}" -gt "${LIMIT_BYTES}" ]; then
            echo "::error::shelfd:ci exceeds the 150 MiB uncompressed gate (${SIZE_MIB} MiB)."
            exit 1
          fi

      - name: Smoke-test --help
        run: docker run --rm --entrypoint /shelfd shelfd:ci --help
