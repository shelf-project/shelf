name: bench

# Benchmark harness automation.
#
# Two modes:
#   1. pr-smoke: triggered on every PR. Runs the fixture-backed smoke
#      profile of TPC-DS + cold-start inside GitHub-hosted runners
#      against a docker-compose stack (SHELF-12). Must finish in <10m.
#   2. nightly-full: runs 02:00 UTC on a self-hosted runner tagged
#      `shelf-bench`. Full matrix across backends, full benchmarks,
#      uploads results to the results bucket stub.
#
# Scaffolding: the jobs here run the scaffold `run.sh` scripts, which
# exit 0 without real work. Gate comparison and results upload are
# TODO_SHELF-26 / TODO_SHELF-27.

on:
  pull_request:
    paths:
      - "benchmarks/**"
      - "shelfd/**"
      - "clients/trino/**"
      - ".github/workflows/bench.yml"
  schedule:
    - cron: "0 2 * * *"        # 02:00 UTC nightly
  workflow_dispatch:
    inputs:
      backends:
        # v1 active matrix is `shelf,raw-s3`. Operators with vendor
        # accounts can opt-in to alluxio-2-9, alluxio-3-dora, fs-cache,
        # warpspeed, or firebolt by passing them here. See
        # benchmarks/in-cluster/README.md and docs/VENDOR-COMPARE.md.
        description: "Comma-separated backends. v1 default: shelf,raw-s3"
        required: false
        default: "shelf,raw-s3"
      profile:
        description: "smoke | full"
        required: false
        default: "full"

permissions:
  contents: read
  pull-requests: write
  id-token: write              # for OIDC to AWS

jobs:
  pr-smoke:
    name: PR smoke (${{ matrix.benchmark }} / ${{ matrix.backend }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # v1 active matrix: shelf vs raw-s3. fs-cache produces noisy
        # 15–20 % hit ratio under KEDA spot churn (operator evidence in
        # AGENTS.md) and is opt-in only via workflow_dispatch.
        benchmark: [tpcds, cold-start, replay]
        backend: [shelf, raw-s3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3 python3-pip
          pip install --quiet "jsonschema>=4.18"

      - name: Lint shell scripts
        run: |
          set -e
          for f in benchmarks/*.sh benchmarks/*/run.sh; do
            bash -n "$f"
          done

      - name: Validate JSON schemas
        run: |
          for f in benchmarks/*/schema.json; do
            python3 -c "import json; json.loads(open('$f').read())"
          done

      - name: Run scaffold smoke (${{ matrix.benchmark }} / ${{ matrix.backend }})
        env:
          SHELF_BENCH_RELEASE_TAG: pr-${{ github.event.pull_request.number }}
          SHELF_BENCH_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "${{ matrix.benchmark }}" == "tpcds" ]]; then
            ./benchmarks/${{ matrix.benchmark }}/run.sh \
              --backend=${{ matrix.backend }} \
              --profile=smoke
          elif [[ "${{ matrix.benchmark }}" == "cold-start" ]]; then
            ./benchmarks/${{ matrix.benchmark }}/run.sh \
              --backend=${{ matrix.backend }} \
              --cycles=1
          else
            ./benchmarks/${{ matrix.benchmark }}/run.sh \
              --backend=${{ matrix.backend }} \
              --days=1 \
              --speed=10x
          fi

      - name: Validate the produced record
        run: |
          schema="benchmarks/${{ matrix.benchmark }}/schema.json"
          latest="$(find benchmarks/results -type f -name '*.json' | head -n 1)"
          if [[ -z "$latest" ]]; then
            echo "no result record found"
            exit 1
          fi
          python3 -m jsonschema -i "$latest" "$schema"

      - name: Upload smoke result
        uses: actions/upload-artifact@v7
        with:
          name: smoke-${{ matrix.benchmark }}-${{ matrix.backend }}
          path: benchmarks/results/**
          retention-days: 7

  regression-gate:
    name: Regression gate (PR only)
    if: github.event_name == 'pull_request'
    needs: pr-smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download smoke artefacts
        uses: actions/download-artifact@v8
        with:
          path: artefacts

      # TODO_SHELF-26: compare quantiles against main baseline
      #   Fail PR if:
      #     p95 regressed by > 10 %
      #     p99 regressed by > 5 %
      - name: Compare against baseline (stub)
        run: |
          echo "scaffold: would compare quantiles against main baseline"
          echo "TODO_SHELF-26: gate logic"

  nightly-full:
    name: Nightly full (${{ matrix.benchmark }} / ${{ matrix.backend }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, shelf-bench]
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        # v1 active matrix: shelf + raw-s3 across the 3 in-scope
        # benchmarks (tpcds, cold-start, replay). spot-churn defers to
        # v1.1; alluxio-2-9 / alluxio-3-dora / fs-cache / warpspeed /
        # firebolt are opt-in via workflow_dispatch (see
        # docs/VENDOR-COMPARE.md for the vendor-cited comparison).
        benchmark: [tpcds, cold-start, replay]
        backend:   [shelf, raw-s3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.BENCH_RUNNER_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Terraform apply (env/)
        run: |
          terraform -chdir=benchmarks/env init -input=false
          terraform -chdir=benchmarks/env apply -auto-approve

      - name: Bootstrap software stack
        run: ./benchmarks/bootstrap.sh --apply --backends=${{ matrix.backend }}

      - name: Run benchmark
        env:
          SHELF_BENCH_RELEASE_TAG: nightly-${{ github.run_id }}
          SHELF_BENCH_COMMIT_SHA: ${{ github.sha }}
        run: |
          case "${{ matrix.benchmark }}" in
            tpcds)      ./benchmarks/tpcds/run.sh      --backend=${{ matrix.backend }} --apply --scale=1tb ;;
            cold-start) ./benchmarks/cold-start/run.sh --backend=${{ matrix.backend }} --apply ;;
            spot-churn) ./benchmarks/spot-churn/run.sh --backend=${{ matrix.backend }} --apply ;;
            replay)     ./benchmarks/replay/run.sh     --backend=${{ matrix.backend }} --apply --days=7 --speed=2x ;;
          esac

      - name: Validate result
        run: |
          schema="benchmarks/${{ matrix.benchmark }}/schema.json"
          latest="$(find benchmarks/results -type f -name '*.json' | sort | tail -n 1)"
          python3 -m jsonschema -i "$latest" "$schema"

      - name: Upload to results bucket
        # SHELF-26 closer (v1): the results bucket is owned by the org;
        # external contributors who fork can override the bucket name
        # via the SHELF_BENCH_RESULTS_BUCKET secret on their fork.
        env:
          BUCKET: ${{ secrets.SHELF_BENCH_RESULTS_BUCKET || 'shelf-bench-results' }}
        run: |
          today="$(date -u +%F)"
          if [[ -d "benchmarks/results/$today" ]]; then
            aws s3 sync "benchmarks/results/$today" \
              "s3://${BUCKET}/${today}/" \
              --exclude '.DS_Store' --quiet
            echo "uploaded benchmarks/results/$today -> s3://${BUCKET}/${today}/"
          else
            echo "no results dir at benchmarks/results/$today; skipping upload"
          fi

      - name: Teardown
        if: always()
        run: |
          ./benchmarks/cleanup.sh --apply || true
          terraform -chdir=benchmarks/env destroy -auto-approve || true

  publish-results:
    name: Publish to RESULTS.md
    if: github.event_name == 'schedule'
    needs: nightly-full
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Open results PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          today="$(date -u +%F)"
          branch="results/${today}"
          # Aggregate all per-record JSON files into RESULTS.md rows
          # via tools/gate.py (gate-board) + a small per-benchmark
          # aggregator. The aggregator is intentionally a no-op when
          # results/$today is missing.
          if [[ ! -d "benchmarks/results/$today" ]]; then
            echo "no results to publish for $today"
            exit 0
          fi

          git config user.name "shelf-bench[bot]"
          git config user.email "shelf-bench@users.noreply.github.com"
          git checkout -b "$branch"

          # The aggregator is an opt-in tool; skip if missing so the
          # workflow still passes during the SHELF-26 transition.
          if [[ -x benchmarks/tools/aggregate_results.sh ]]; then
            benchmarks/tools/aggregate_results.sh "benchmarks/results/$today"
          fi

          if git diff --quiet benchmarks/RESULTS.md; then
            echo "RESULTS.md unchanged; nothing to PR."
            exit 0
          fi

          git add benchmarks/RESULTS.md benchmarks/results/$today/
          git commit -m "results(${today}): nightly aggregate"
          git push --set-upstream origin "$branch"
          gh pr create --title "results: ${today}" \
            --body "Auto-generated nightly results aggregate. See \`benchmarks/RESULTS.md\` for the gate board." \
            --base main --head "$branch" || true
