# shelf-advisor — OSS-clean default config.
#
# Copy to ~/.shelf-advisor/config.yaml (or pass with `--config`)
# and edit the URLs / table name to match your deployment. Every
# field has a compiled-in default; this file documents the
# surface so an operator can see every knob in one place.
#
# Site-specific overlays live elsewhere in the operator's tree
# (under their `infra/<cluster>/` directory) and are merged
# in via the same `--config` flag — never edit this file with
# deployment-specific identifiers; that's what the overlay is for.

# -----------------------------------------------------------------
# Inputs
# -----------------------------------------------------------------

# Fully-qualified `catalog.schema.table` of the Trino event-listener
# log table written by the SHELF-60 jar (design note still filed
# under agents/out/SHELF-37-iceberg-event-listener-jar.md, tracked
# in PR #66 at HEAD).
event_log_table: shelf_advisor.events.query_log

# Default lookback window for `analyze` / `recommend` / `watch`.
# CLI `--window` always wins.
window: 7d

# Hard cap on recommendations per (table, recommendation_type).
# Mirrors the false-positive-flood guardrail in the canonical
# SHELF-53 design note.
top_n_per_table: 8

# Global confidence floor; applied AFTER each recommender's own
# floor. Whichever is higher wins.
min_confidence: 0.5

# Per-pod shelfd `/stats` URLs the advisor will scrape. Same-cluster
# only; no auth. Leave empty in CI / dry-run.
shelfd_stats_urls: []
#  - http://shelf-0.shelf.svc.cluster.local:8080/stats
#  - http://shelf-1.shelf.svc.cluster.local:8080/stats

# -----------------------------------------------------------------
# OptimizeRecommender (small-file detection over Iceberg manifests)
# -----------------------------------------------------------------
optimize:
  # Files smaller than this count toward the "small file" ratio.
  # 32 MiB matches the threshold cited in the canonical SHELF-53
  # design note (RisingWave small-file blog).
  small_file_bytes: 33554432    # 32 MiB
  # Below this ratio the table is not flagged.
  small_file_ratio_min: 0.30
  # Tables with fewer than this many data files are skipped
  # (every small-file count looks "100 % small" on a 3-file table).
  min_files_per_table: 8

# -----------------------------------------------------------------
# PinListRecommender (top-N hot tables by score)
# -----------------------------------------------------------------
pin_list:
  # Tables seen in fewer than this many queries within the window
  # are dropped before scoring (cold workloads do not benefit
  # from pinning).
  min_frequency: 5
  # Per-recommender confidence floor.
  min_confidence: 0.6
  # Fallback pool capacity used when no shelfd /stats sample is
  # available. 11 GiB matches the rc.2 rowgroup pool default in
  # charts/shelf/values.yaml.
  default_pool_capacity_bytes: 11811160064  # 11 GiB

# -----------------------------------------------------------------
# BloomFilterRecommender — owned by SHELF-52
# -----------------------------------------------------------------
# SHELF-53 ships the trait + a stub. Keep `enabled: false` until
# SHELF-52 lands the real implementation.
bloom:
  enabled: false
  min_confidence: 0.7

# -----------------------------------------------------------------
# MaterializedViewRecommender — owned by SHELF-65
# -----------------------------------------------------------------
# SHELF-53 ships the trait + a stub. Keep `enabled: false` until
# SHELF-65 lands the real implementation.
mv:
  enabled: false
  min_confidence: 0.5
  # Cap on pinned bytes per recommendation, expressed as a
  # fraction of the rowgroup pool capacity. Carries SHELF-65's
  # `nvme_quota * pin_fraction` invariant.
  pin_fraction: 0.30
