# SHELF-37 Iceberg event-listener config — penpencil origin cluster.
#
# This file is the ONLY place penpencil-specific identifiers appear for
# the SHELF-37 deliverable. The OSS module (clients/trino-listener/) is
# cluster-agnostic by design; this overlay picks up the bucket / IRSA /
# HMS / table names that only make sense inside the data-platform-cluster
# EKS environment.
#
# Drop this file at /etc/trino/event-listener.properties on every
# trino-replica-{0,1,2,3} coordinator pod (mounted via the Helm chart's
# `additionalEventListenerProperties` block in
# infra/penpencil/charts/shelf/values-prod.yaml — landing in a follow-up).
#
# References:
#   * AGENTS.md → "cdp.trino_logs.trino_queries" already partitioned by
#     `query_date` timestamp; the OSS module mirrors that with
#     `day(create_time)`. We pick a *new* table name (`*_oss`) so the
#     SHELF-37 jar runs alongside the existing MySQL-backed listener
#     during the dual-write soak.
#   * SHELF-21 / SHELF-25 → IRSA-backed S3 writes succeed via shelfd shim
#     once preview-9+ is in place; this listener writes directly through
#     iceberg-aws S3FileIO, NOT through the shim.

event-listener.name=shelf-iceberg-listener

# Iceberg catalog.
shelf.listener.iceberg.catalog=hive_prod
shelf.listener.iceberg.catalog-impl=org.apache.iceberg.hive.HiveCatalog
shelf.listener.iceberg.uri=thrift://trino-prod-metastore.penpencil.co:9083
shelf.listener.iceberg.warehouse=s3a://pw-data-cdp-prod-temp/warehouse/

# Target table — chosen to live alongside the existing MySQL-backed
# event listener so the cutover is dual-write → diff → switch, not
# big-bang. `*_oss` suffix = "this row was written by the OSS jar".
shelf.listener.iceberg.table=trino_logs.trino_queries_oss

# S3 + IRSA wiring. The data-platform-alluxio-role IAM role already has
# scoped writes to .alluxio_s3_api_metadata/* on
# pw-data-cdp-prod-{bronze,gold,silver,temp}-layer (PDAE-6680, DO-12084,
# DO-12143). Write to pw-data-cdp-prod-temp because that's where the
# Alluxio shim's writable prefix is — same access path shelf has been
# soak-validated on.
shelf.listener.iceberg.io-impl=org.apache.iceberg.aws.s3.S3FileIO
shelf.listener.iceberg.s3.region=ap-south-1

# Production safety knobs.
#   * 5000-row batches keep commit cardinality under 1 commit / 30 s,
#     well below HMS metastore commit-rate limits observed on the
#     `metastore` Deployment in trino-namespace of production-cluster.
#   * fail-mode=drop matches the AGENTS.md rule that QueryCompletedEvent
#     never blocks the coordinator. The `block` mode is reserved for the
#     soak window when we want write-stall to be diagnosable.
#   * write.enabled=true; flip to false during the dual-write cutover
#     soak to silence the OSS writer without yanking the plugin.
shelf.listener.batch.max-rows=5000
shelf.listener.batch.max-interval-secs=30
shelf.listener.queue.capacity=20000
shelf.listener.fail-mode=drop
shelf.listener.write.enabled=true

# JMX is the primary scrape path on this cluster (jmx_prometheus_javaagent
# is already on every trino pod per AGENTS.md). The HTTP endpoint is
# off; flip the two lines below if a dedicated Prom scrape target is
# preferred.
shelf.listener.metrics.prometheus.enabled=false
# shelf.listener.metrics.prometheus.port=9099
