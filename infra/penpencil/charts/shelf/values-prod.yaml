# Production overlay — example values for a 3-pod shelfd StatefulSet on
# a dedicated EKS node pool with NVMe-backed PVCs and IRSA-based S3 auth.
#
# Treat this file as a starting template, NOT a drop-in. Tune sizing,
# bucket names, and IRSA role ARN to match your environment, then commit
# the result to your own deployments repo.
#
# Sizing rule of thumb (per pod):
#   pod.limits.memory MUST exceed
#     cache.pools.metadata.sizeBytes
#   + cache.pools.rowgroup.dramSizeBytes
#   + (origin.pool.maxConnections × ~32 MiB worst-case rowgroup)
#   + cache.pools.rowgroup.diskCache.submitQueueSizeThresholdBytes
#   + ~3 GiB Rust runtime / tokio stacks / jemalloc fragmentation headroom
#
# Violating this rule causes the kernel OOM-killer to terminate the pod
# under load. The defaults below are conservative for a 32 GiB pod limit
# on a node with ~27 GiB allocatable.

replicaCount: 3

image:
  repository: ghcr.io/shelf-project/shelfd
  pullPolicy: IfNotPresent
  # tag intentionally empty — falls back to Chart.appVersion (currently 1.0.0-rc.4); update Chart.yaml only.
  tag: ""

serviceAccount:
  create: true
  annotations:
    # IRSA role with read access to the origin bucket. Replace with your
    # own role ARN. The role's trust policy must permit
    # system:serviceaccount:<ns>:<release-name>-shelf.
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/shelf-prod-s3-read

resources:
  requests:
    cpu: "4"
    memory: "24Gi"
  limits:
    cpu: "8"
    memory: "32Gi"

storage:
  # Prefer local-nvme on instance-store node families (i4i, c6id, m6id,
  # c7gd). Fall back to ebs-gp3-wffc on EBS-only families.
  storageClassName: local-nvme
  size: 240Gi

cache:
  pools:
    metadata:
      sizeBytes: 5368709120          # 5 GiB
    rowgroup:
      # SHELF-E1b — LRU so every memory eviction flows through to NVMe.
      # S3-FIFO is scan-resistant but keeps one-shot BI reads off NVMe;
      # flip back to s3_fifo only when the SHELF-26 replay harness
      # shows a per-policy hit-ratio gain on your workload.
      evictionPolicy: lru
      # SHELF-21f (2026-04-29): see overlay note in values.yaml.
      dramSizeBytes: 11811160064     # 11 GiB (was 14 GiB)
      nvmeSizeBytes: 257698037760    # 240 GiB; matches storage.size
      # Foyer LODC tunables — bound the disk-cache submit queue so a
      # burst of inflight rowgroups can't OOM the pod under load.
      # SHELF-21f bumped flushers + bufferPool so the queue actually
      # drains in steady state.
      diskCache:
        flushers: 8                                 # was 4 (was Foyer default 1)
        bufferPoolSizeBytes: 402653184              # 384 MiB (was 256 MiB)
        submitQueueSizeThresholdBytes: 1073741824   # 1 GiB hard cap on LODC RSS pressure
      # B1 — opt-in zstd compression of cached row-group payloads.
      # Stays disabled in prod by default; flip per replica during a
      # planned cutover window. The on-disk safety contract requires
      # wiping the NVMe ring (StatefulSet pod's PVC) before the first
      # boot in compressed mode, since pre-flip raw frames are
      # indistinguishable from header-tagged frames. Switch playbook
      # is in charts/shelf/values.yaml above the same key.
      compression:
        enabled: false
        level: 3
        minSizeBytes: 256
  admission:
    sizeThresholdMiB: 1024
    pinnedBypass: true
    model:
      enabled: false
      s3Uri: ""
      maxAgeHours: 48
  pinList:
    # S3-backed pin list. Operators regenerate this from query logs;
    # see tools/gen_pin_list.py.
    s3Uri: ""
    reloadIntervalSeconds: 900

  # SHELF-40 — `shelf_s3_dollars_saved_total` cost-saved counter.
  # Penpencil cluster runs in `ap-south-1` (Mumbai); the
  # ap-south-1 preset in `crates/shelf-cost/src/coefficients.rs`
  # is wired with the same citations as `us-east-1`:
  #
  #   • S3 GET ($0.0004 / 1k requests, S3 Standard, ap-south-1)
  #     https://aws.amazon.com/s3/pricing/  — § "Requests &
  #     data retrievals" tab, "Asia Pacific (Mumbai)" row.
  #   • Same-AZ data transfer = $0.00 / GiB.
  #     https://aws.amazon.com/ec2/pricing/on-demand/  — § "Data
  #     Transfer", "All AWS Regions" → same-AZ row.
  #   • Cross-AZ data transfer = $0.01 / GiB each direction.
  #     https://aws.amazon.com/ec2/pricing/on-demand/  — § "Data
  #     Transfer within the same AWS Region".
  #   • NAT-gateway data processing = $0.045 / GiB
  #     https://aws.amazon.com/vpc/pricing/  — § "Pricing for
  #     NAT gateway", "Asia Pacific (Mumbai)" row.
  #
  # Penpencil clusters use the S3 VPC gateway endpoint, so NAT
  # processing does NOT apply to S3 traffic — `nat_traversal_basis_points`
  # stays at the default `0` and the NAT term contributes 0 cents.
  # If the topology changes (e.g. a private-subnet egress through
  # NAT to S3), set `natTraversalBasisPoints: 10000` and the
  # counter will start crediting NAT savings.
  cost:
    enabled: true
    region: ap-south-1
    # Inherit the ap-south-1 preset for every coefficient. To
    # override (e.g. EDP discount), set the matching field below
    # in your overlay and update the citation block above.
    # natTraversalBasisPoints: 0   # default; S3 VPC endpoint = no NAT charge
    # A4 (rc.7) — net dollars-saved accountant. The pool currently
    # runs 6 pods × m5a.4xlarge × $0.864/hr ≈ $5.18/hr in
    # ap-south-1 (On-Demand list price; Spot / RI / EDP discount
    # would lower this). Operator MUST verify against the actual
    # EKS bill before merging — see the v2 dashboard's Per-pod
    # cost panel and the Athena CUR `cur` table filter
    # `resource_tags_aws_eks_deployment LIKE 'shelf%'`.
    amortizedDollarsPerHour: 5.18

  # SHELF-42 — A/B query tagging. Penpencil opts in: Prometheus
  # retention is already sized for the per-tag series and the
  # post-cutover analysis SQL relies on `shelf_arm`-style cohort
  # labels. Spec: docs/contracts/ab-tag.md.
  abTag:
    enabled: true
    maxDistinctTags: 16
    scrapeWindow: 60s

  # SHELF-50 decoded-metadata cache. Left OFF in this overlay until
  # SHELF-46 (bloom-aware footer admission) is the first downstream
  # consumer ready to read decoded data. Flip `enabled: true` then
  # — see `shelfd/docs/design-notes/SHELF-50-decoded-metadata-cache.md`
  # for the rollout sequence.
  # decodedMeta:
  #   enabled: true
  #   maxManifestEntries: 10000
  #   maxFooterEntries: 10000

  # SHELF-46 — Bloom-aware footer admission. Left OFF on this overlay
  # until both SHELF-49 (range coalescing) and B1 (zstd metadata
  # compression) have soaked on a canary replica. The classifier is
  # cheap when disabled (a single null check), so this default has
  # no measurable effect on the data plane until flipped on.
  #
  # Rollout plan when ready (24h-per-step canary):
  #   1. Flip on rep-2 (lowest infra failure rate post-cutover).
  #   2. Watch `shelf_bloom_admit_total{kind=footer}` climb,
  #      `shelf_bloom_index_entries` plateau, and
  #      `shelf_bloom_parse_errors_total` stay near zero.
  #   3. Re-baseline `cdp.trino_logs.trino_queries` per-replica
  #      `physical_input_read_time_millis` and
  #      `ICEBERG_BAD_DATA` / `ICEBERG_INVALID_METADATA` counts
  #      against the previous 7-day window.
  #   4. Extend to rep-1, then rep-0, then rep-3.
  bloom:
    enabled: false
    maxIndexEntries: 50000
    minFooterBytes: 65536

  # SHELF-45 — compaction-aware re-warm reactor. Stays OFF on this
  # overlay until the post-A3 soak window proves the metadata-poll
  # source is stable. The A3 (rc.7) poller (ADR-0036) is the
  # designated default trigger source now that SHELF-37 (PR #66) is
  # parked on the JDK-25 absence; flip `enabled: true` AND populate
  # `tables` from the latest `gen_pin_list` top-N before the
  # cutover MR. Re-quote `maxBytesPerSec` against the live
  # `alluxio` NodePool's gp3 read budget once the soak proves the
  # default 50 MiB/s/pod does not leak into client read latency.
  #
  # A3 example shape (kept commented — operators uncomment + edit
  # ahead of the cutover MR; bucket names belong in this overlay
  # only, never in the upstream OSS chart):
  # rewarm:
  #   enabled: true
  #   maxBytesPerSec: 52428800
  #   maxConcurrentFiles: 4
  #   queueCapacity: 1024
  #   snapshotLagToleranceSecs: 120
  #   pollIntervalSecs: 30
  #   maxBytesPerSnapshot: 5368709120  # 5 GiB cap per detected snapshot
  #   tables:
  #     - bucket: pw-data-cdp-prod-gold-layer
  #       keyPrefix: warehouse/cdp/datamart/silver_user_events
  #       label: cdp.datamart.silver_user_events
  #     # populate the rest from gen_pin_list top-N before cutover

origin:
  # Origin bucket (the data lake Trino reads).
  bucket: ""
  region: us-east-1
  pool:
    # 128 × ~32 MiB = ~4 GiB worst-case in-flight buffer cap.
    # Trino's S3 client reuses connections aggressively, so 128 saturates
    # a single shelfd pod's bandwidth before connection count matters.
    maxConnections: 128
    idleTimeoutSeconds: 60

trino:
  namespace: trino
  coordinatorPodLabels:
    app: trino
    component: coordinator
  workerPodLabels:
    app: trino
    component: worker

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

priorityClass:
  create: true
  value: 100000

nodeSelector:
  workload: shelf

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: shelf
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: shelf

logging:
  level: info

# SHELF-65 — MV-aware pinning recommender knobs (consumed by the
# `shelf-advisor` binary, not shelfd). The chart does not yet
# template these into a ConfigMap because the advisor is run
# manually today; this block is the canonical place for the
# cluster-specific overrides so when the advisor's YAML loader
# lands (SHELF-53) it picks them up without further changes.
advisor:
  mv_pinning:
    # Widen the refresh-user pattern beyond the OSS default
    # (`^airflow_`) to catch the in-cluster `_etl` users — these
    # are the bespoke ETL accounts that don't go through the
    # canonical `REFRESH MATERIALIZED VIEW` DDL but still drive
    # the same base-table read pattern.
    refresh_user_pattern: 'airflow_*|.*_etl'
    # NVMe size matches storage.size above (240 GiB).
    nvme_capacity_bytes: 257698037760
    # Half of NVMe is the conservative pin-set ceiling; revisit
    # once the SHELF-63 compaction-rewarm reactor is also
    # contending for cache space.
    max_pin_bytes_pct: 0.5
