# Production overlay — example values for a 3-pod shelfd StatefulSet on
# a dedicated EKS node pool with NVMe-backed PVCs and IRSA-based S3 auth.
#
# Treat this file as a starting template, NOT a drop-in. Tune sizing,
# bucket names, and IRSA role ARN to match your environment, then commit
# the result to your own deployments repo.
#
# Sizing rule of thumb (per pod):
#   pod.limits.memory MUST exceed
#     cache.pools.metadata.sizeBytes
#   + cache.pools.rowgroup.dramSizeBytes
#   + (origin.pool.maxConnections × ~32 MiB worst-case rowgroup)
#   + cache.pools.rowgroup.diskCache.submitQueueSizeThresholdBytes
#   + ~3 GiB Rust runtime / tokio stacks / jemalloc fragmentation headroom
#
# Violating this rule causes the kernel OOM-killer to terminate the pod
# under load. The defaults below are conservative for a 32 GiB pod limit
# on a node with ~27 GiB allocatable.

replicaCount: 6

image:
  repository: ghcr.io/shelf-project/shelfd
  pullPolicy: IfNotPresent
  # Pin to the exact tag your release pipeline produces. Empty string =
  # .Chart.AppVersion (acceptable in dev; never in prod).
  tag: "0.1.0"

serviceAccount:
  create: true
  annotations:
    # IRSA role with read access to the origin bucket. Replace with your
    # own role ARN. The role's trust policy must permit
    # system:serviceaccount:<ns>:<release-name>-shelf.
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/shelf-prod-s3-read

resources:
  requests:
    cpu: "4"
    memory: "24Gi"
  limits:
    cpu: "8"
    memory: "32Gi"

storage:
  # Cluster uses EBS gp3; must match the storageClass already in the
  # StatefulSet VolumeClaimTemplate (immutable after first deploy).
  storageClassName: ebs-gp3-wffc
  size: 300Gi

cache:
  pools:
    metadata:
      sizeBytes: 7516192768          # 7 GiB (was 5 GiB; rebalanced from rowgroup DRAM)
    rowgroup:
      # Reverted to S3-FIFO: production peak-hour thrashing showed
      # concurrent ad-hoc scans evicting hot dashboard rowgroups under
      # LRU. S3-FIFO's small-queue filter protects frequently-reused
      # data from one-shot scan pollution.
      evictionPolicy: s3_fifo
      # 9 GiB + 7 GiB metadata = 16 GiB total, same as before.
      # RSS budget: 27.3 - (7+9+4+1+3) = ~3.3 GiB headroom.
      dramSizeBytes: 9663676416      # 9 GiB (was 11 GiB)
      nvmeSizeBytes: 322122547200    # 300 GiB; matches storage.size
      diskCache:
        flushers: 8
        bufferPoolSizeBytes: 402653184              # 384 MiB
        submitQueueSizeThresholdBytes: 1073741824   # 1 GiB
  admission:
    # Raised from 1024 → 4096 MiB: 1-3 GiB tables were silently
    # rejected and re-fetched from S3 on every query.
    sizeThresholdMiB: 4096
    pinnedBypass: true
    model:
      enabled: false
      s3Uri: ""
      maxAgeHours: 48
  pinList:
    s3Uri: ""
    # Lowered from 900 → 120 s so newly hot tables appear in the pin
    # list within 2 min instead of 15 min.
    reloadIntervalSeconds: 120

origin:
  # Origin bucket (the data lake Trino reads).
  bucket: ""
  region: us-east-1
  pool:
    # 128 × ~32 MiB = ~4 GiB worst-case in-flight buffer cap.
    # Trino's S3 client reuses connections aggressively, so 128 saturates
    # a single shelfd pod's bandwidth before connection count matters.
    maxConnections: 128
    idleTimeoutSeconds: 60

trino:
  namespace: trino
  coordinatorPodLabels:
    app: trino
    component: coordinator
  workerPodLabels:
    app: trino
    component: worker

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

priorityClass:
  create: true
  value: 100000

nodeSelector:
  workload: shelf

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: shelf
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: shelf

logging:
  level: info
