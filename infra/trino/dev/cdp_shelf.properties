# -----------------------------------------------------------------------------
# Example Trino catalog: Iceberg routed via shelfd's S3 shim (dev).
#
# Drop this file into your Trino coordinator's catalog directory (or
# the equivalent ConfigMap key in the chart you ship Trino with) and
# adjust hostnames / region / credentials for your environment.
#
# Reference: docs/runbook.md §Kill-switch.
# -----------------------------------------------------------------------------

connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=thrift://hms:9083

# -----------------------------------------------------------------------------
# Native S3 via shelfd shim. The shim ignores SigV4 headers (it routes
# path-style requests to the origin via IRSA), so any non-empty access /
# secret key works as a placeholder. In production wire real credentials
# (or IRSA on the Trino pod) and let the shim ignore them. See
# shelfd/src/s3_shim.rs.
# -----------------------------------------------------------------------------
fs.native-s3.enabled=true
s3.aws-access-key=${ENV:SHELF_S3_ACCESS_KEY}
s3.aws-secret-key=${ENV:SHELF_S3_SECRET_KEY}
s3.endpoint=http://shelf.shelf.svc.cluster.local:9092
s3.region=us-east-1
s3.path-style-access=true

# -----------------------------------------------------------------------------
# HMS + Iceberg metadata-cache tuning.
#
# Iceberg commits are served by reading the snapshot pointer from HMS;
# the cached manifest metadata is ETag-versioned and content-addressed
# in shelfd, so stale HMS entries only matter for catalog-level
# operations (SHOW TABLES, column lineage). ETL that publishes new
# tables triggers NOTIFICATION_LOG → pin-list refresher
# (tools/hms_notification_poller.py), which also invalidates HMS
# entries.
# -----------------------------------------------------------------------------
hive.metastore-cache-ttl=60m
hive.metastore-refresh-interval=5m
hive.metastore-cache-maximum-size=10000

iceberg.metadata-cache.enabled=false
iceberg.metadata-cache.max-size=1000
iceberg.metadata-cache.ttl=60m

# -----------------------------------------------------------------------------
# Iceberg connector settings.
# -----------------------------------------------------------------------------
iceberg.register-table-procedure.enabled=true
iceberg.unique-table-location=true
iceberg.compression-codec=SNAPPY
iceberg.add-files-procedure.enabled=true
iceberg.file-format=PARQUET
hive.metastore.thrift.delete-files-on-drop=true
iceberg.query-partition-filter-required=true
iceberg.allowed-extra-properties=['write.target-file-size-bytes', 'write.distribution-mode', 'write.metadata.delete-after-commit.enabled']
iceberg.expire-snapshots.min-retention=3d
iceberg.remove-orphan-files.min-retention=3d

# -----------------------------------------------------------------------------
# Iceberg materialized-view auto-rewrite — the optimizer will transparently
# rewrite GROUP BY queries to read from a matching MV when one exists.
# -----------------------------------------------------------------------------
iceberg.materialized-views.enabled=true

# -----------------------------------------------------------------------------
# Scan-path tuning. Tuned for shelf's byte-range coalescing (store.rs
# single-flight) so the cache sees the workload shape it was built for.
# -----------------------------------------------------------------------------
iceberg.split-size=128MB
iceberg.max-initial-splits=200
iceberg.min-assigned-split-weight=0.05

# fs.native-s3 HTTP/2: Trino client-side h2 multiplex cuts TCP handshake
# per footer read; shelfd is HTTP/2-only (ADR-0004).
fs.native-s3.http2=true
s3.max-connections=512
s3.request-timeout=30s
