# -----------------------------------------------------------------------------
# Per-coordinator Shelf catalog template — replica index 2.
#
# This is an *OSS template*. It deliberately contains NO operator-specific
# values (HMS hostname, S3 bucket, IRSA ARN, region, internal DNS suffix).
# Each operator binds the placeholders below from their own private
# deployment repo (Helm values / ArgoCD chart values / kustomize patch).
#
# Trino's `${ENV:NAME}` placeholder resolver is supported for every
# property below; the actual values are injected as environment variables
# into the coordinator + worker pods, sourced from a Secret or ConfigMap
# the operator owns. **Never check resolved values into this file.**
#
# B1a (per-coordinator pinning) summary:
#   Each Trino coordinator pod points at a *specific* shelfd pod via
#   headless-service DNS. This bypasses kube-proxy ClusterIP round-robin
#   and keeps each coord's DRAM working set on one cache pod. Replace
#   `<replica index>` with the ordinal of the coordinator using this
#   file (this file = ordinal 2).
#
# Auth model:
#   shelfd's S3 shim is auth-less at the wire level — it ignores the
#   inbound `Authorization` header and re-signs upstream with its own
#   IRSA. Do NOT set `s3.aws-access-key` / `s3.aws-secret-key` here.
#   The Trino native S3 client picks up IRSA credentials via the
#   DefaultCredentialsProvider chain when the coordinator pod has an
#   `AWS_WEB_IDENTITY_TOKEN_FILE` mounted by its ServiceAccount.
# -----------------------------------------------------------------------------

connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=${ENV:HIVE_METASTORE_URI}

fs.native-s3.enabled=true
# Headless-service DNS to the shelfd pod assigned to this coordinator
# ordinal. Operators inject the resolved hostname:port via env var.
s3.endpoint=${ENV:SHELF_S3_ENDPOINT}
s3.region=${ENV:AWS_REGION}
s3.path-style-access=true

# -----------------------------------------------------------------------------
# Iceberg + S3 knobs (track A1 + B2). Generic; safe to keep in OSS.
# -----------------------------------------------------------------------------
hive.metastore-cache-ttl=60m
hive.metastore-refresh-interval=5m
hive.metastore-cache-maximum-size=10000
iceberg.metadata-cache.enabled=true
iceberg.metadata-cache.max-size=1000
iceberg.metadata-cache.ttl=60m
iceberg.materialized-views.enabled=true
iceberg.split-size=128MB
iceberg.max-initial-splits=200
iceberg.min-assigned-split-weight=0.05
fs.native-s3.http2=true
s3.max-connections=512
s3.request-timeout=30s

iceberg.register-table-procedure.enabled=true
iceberg.unique-table-location=true
iceberg.compression-codec=SNAPPY
iceberg.add-files-procedure.enabled=true
iceberg.file-format=PARQUET
hive.metastore.thrift.delete-files-on-drop=true
iceberg.query-partition-filter-required=true
iceberg.query-partition-filter-required-schemas=${ENV:ICEBERG_PARTITION_FILTER_SCHEMAS}
iceberg.allowed-extra-properties=['write.target-file-size-bytes', 'write.distribution-mode', 'write.metadata.delete-after-commit.enabled']
iceberg.expire-snapshots.min-retention=3d
iceberg.remove-orphan-files.min-retention=3d
