# trino-catalog-recipe.yaml
#
# Drop-in Trino catalog block for Iceberg tables fronted by shelf-pool.
# Tested on Trino 480+. Each property's rationale + Trino source reference
# is inlined below.
#
# How to apply
# ------------
# Replace the existing Iceberg-on-S3 catalog block in your Trino values
# file with this template, substituting:
#
#   <SHELF_POOL_HOST>:9092  with your shelf-pool ClusterIP / Service DNS
#   <S3_REGION>             with your AWS region (e.g. us-east-1)
#   <HMS_URI>               with your Hive Metastore Thrift URI
#                           (e.g. thrift://hive-metastore:9083)
#   <your_catalog>          with whatever you want this catalog to be
#                           called from Trino (e.g. iceberg, lake, cdp)
#
# Source of truth for the tuning block: this set was validated against a
# 7-day production workload of 46K SELECTs (45.7% selective <100MB,
# 50.6% JOIN, 22.1% equality-pushdown). Every property below is verified
# against its `@Config(...)` annotation in Trino 480 source.

<your_catalog>: |-
  connector.name=iceberg
  iceberg.catalog.type=hive_metastore
  hive.metastore.uri=<HMS_URI>
  fs.native-s3.enabled=true
  s3.endpoint=http://<SHELF_POOL_HOST>:9092
  s3.region=<S3_REGION>
  s3.path-style-access=true
  iceberg.compression-codec=SNAPPY
  iceberg.file-format=PARQUET

  # === SHELF TUNING (rc.7 recommended) ===
  #
  # All five properties below are cost-neutral or cost-down. None of
  # them increase EC2 spend; they unshadow the shelf metadata pool and
  # tighten read amplification on the existing worker fleet.

  # Disable Trino's in-JVM metadata cache; forces metadata reads through
  # the shelf S3 shim (and onward into the SHELF-50 decoded-meta cache,
  # when enabled). Without this, the shelf metadata pool typically runs
  # at ~0.14% hit ratio because Trino caches in-JVM and bypasses the
  # shim entirely on warm reads.
  # Trino source: IcebergConfig.java
  #   @Config("iceberg.metadata-cache.enabled")
  iceberg.metadata-cache.enabled=false

  # Tighter dynamic-filtering wait. 3s is typically enough for hash-join
  # build sides to complete; longer waits stall queries on the JOIN
  # cohort (~50% of all SELECTs in the validation workload). Default in
  # Trino is 1m, which is too lax once shelf is serving the build side.
  # Trino source: IcebergConfig.java
  #   @Config("iceberg.dynamic-filtering.wait-timeout")
  iceberg.dynamic-filtering.wait-timeout=3s

  # Cap the per-worker S3 client connection pool so a multi-worker Trino
  # fleet does not exceed the per-pod budget on shelf-pool. Sized for a
  # 6-pod shelf-pool (6 × ~256 = ~1536 cluster-wide cap) — adjust if
  # your shelf-pool has a different pod count or per-pod budget.
  # Trino source: S3FileSystemConfig.java
  #   @Config("s3.max-connections")
  s3.max-connections=256

  # Coalesce small Parquet file reads. Iceberg metadata files and small
  # partition files <8MB get fetched in a single GET instead of three or
  # four range reads, which reduces both wall-clock latency and S3
  # request count.
  # Trino source: ParquetReaderConfig.java (plugin/trino-hive)
  #   @Config("parquet.small-file-threshold")
  parquet.small-file-threshold=8MB

  # Survive idle TCP drop by kube-proxy / load balancer between Trino
  # workers and the shelf S3 shim. Without this, long-running queries
  # can see spurious "connection reset" failures after multi-minute
  # planning gaps.
  # Trino source: S3FileSystemConfig.java
  #   @Config("s3.tcp-keep-alive")
  s3.tcp-keep-alive=true

  # === END SHELF TUNING ===

  # Conservative snapshot / orphan retention so OPTIMIZE and
  # expire_snapshots cannot delete files that an in-flight query still
  # holds open. Tune to your retention policy.
  iceberg.expire-snapshots.min-retention=3d
  iceberg.remove-orphan-files.min-retention=3d
