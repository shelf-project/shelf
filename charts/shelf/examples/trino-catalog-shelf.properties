# Example Trino catalog properties for a shelf-fronted Iceberg catalog.
#
# Copy this file to your Trino catalog ConfigMap and adjust:
#   1. connector.name — leave as "iceberg"
#   2. hive.metastore.uri — your HMS thrift endpoint
#   3. s3.endpoint — the shelf-pool headless service (shelf S3 shim)
#   4. s3.path-style-access — must be true for the shim
#
# Key settings for shelf performance (see TODO-fix-shelf-performance.md):
#
#   iceberg.metadata-cache.enabled=false
#     Unshadows Trino's JVM-local MemoryFileSystemCache so metadata/footer
#     traffic hits shelfd and Prometheus reflects real metadata-pool behavior.
#     Without this, Trino caches manifests/footers in-JVM and shelfd's
#     metadata-pool hit ratio stays at ~0%.
#
#   iceberg.dynamic-filtering.wait-timeout=3s
#     Caps dynamic filter stall per query (default 0s = unbounded wait).
#
#   s3.max-connections=256
#     Raises native S3 client pool cap from default 50.
#
#   parquet.small-file-threshold=8MB
#     Merges small footer reads into single requests.
#
#   s3.tcp-keep-alive=true
#     Keeps idle S3 connections warm across shim proxy hops.

connector.name=iceberg

# Hive Metastore (adjust to your HMS endpoint)
hive.metastore.uri=thrift://metastore.your-namespace.svc.cluster.local:9083

# Shelf S3 shim endpoint (adjust namespace to match your shelf deployment)
s3.endpoint=http://shelf-pool.alluxio.svc.cluster.local:9092
s3.path-style-access=true

# CRITICAL: Disable Trino's JVM-local metadata cache so shelfd sees all reads
iceberg.metadata-cache.enabled=false

# Performance tuning
iceberg.dynamic-filtering.wait-timeout=3s
s3.max-connections=256
parquet.small-file-threshold=8MB
s3.tcp-keep-alive=true

# AWS credentials via IRSA (no explicit keys)
s3.use-instance-credentials=true
s3.region=ap-south-1
