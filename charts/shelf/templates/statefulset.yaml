apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "shelf.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shelf.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "shelf.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy }}
  # SHELF-22 — wait this many seconds after a new pod is Ready before the
  # StatefulSet controller starts terminating the next pod in a rollout.
  # Combined with the new ClusterIP svc `shelf-pool`, this gives the
  # incoming pod time to be added to the svc endpoint set + warm hot keys
  # before its predecessor is taken out, making rollouts trino-invisible.
  minReadySeconds: {{ .Values.statefulset.minReadySeconds | default 30 }}
  updateStrategy:
    type: {{ .Values.statefulset.updateStrategy.type }}
  selector:
    matchLabels:
      {{- include "shelf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shelf.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "shelf.serviceAccountName" . }}
      {{- with include "shelf.priorityClassName" . }}
      priorityClassName: {{ . }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: shelfd
          image: {{ include "shelf.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: data
              containerPort: {{ .Values.service.dataPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
            - name: s3shim
              containerPort: {{ .Values.service.s3shimPort }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.service.adminPort }}
              protocol: TCP
          # Only SHELFD_* env keys are honored by shelfd (main.rs); chart-level config goes through the ConfigMap above.
          env:
            - name: SHELFD_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SHELFD_LOG
              value: {{ .Values.logging.level | quote }}
            - name: SHELFD_ORIGIN_BUCKET
              value: {{ .Values.origin.bucket | quote }}
            - name: SHELFD_ORIGIN_REGION
              value: {{ .Values.origin.region | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if and .Values.probes.startup (gt (int (.Values.probes.startup.failureThreshold | default 0)) 0) }}
          startupProbe:
            httpGet:
              path: /healthz
              port: data
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds | default 3 }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: data
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: data
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nvme
              mountPath: {{ .Values.storage.mountPath }}
            - name: tmp
              mountPath: /tmp
            - name: shelfd-config
              mountPath: /etc/shelfd
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: shelfd-config
          configMap:
            name: {{ include "shelf.fullname" . }}-shelfd
  volumeClaimTemplates:
    - metadata:
        name: nvme
        labels:
          {{- include "shelf.labels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
