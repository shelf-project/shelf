apiVersion: v1
kind: Service
metadata:
  name: {{ include "shelf.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shelf.labels" . | nindent 4 }}
spec:
  # Headless service — ADR-0001 membership resolution is via per-pod DNS.
  clusterIP: None
  type: {{ .Values.service.type }}
  selector:
    {{- include "shelf.selectorLabels" . | nindent 4 }}
  ports:
    - name: data
      port: {{ .Values.service.dataPort }}
      targetPort: data
      protocol: TCP
      appProtocol: kubernetes.io/h2c
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
    - name: s3shim
      port: {{ .Values.service.s3shimPort }}
      targetPort: s3shim
      protocol: TCP
    - name: admin
      port: {{ .Values.service.adminPort }}
      targetPort: admin
      protocol: TCP
