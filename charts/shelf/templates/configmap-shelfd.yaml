apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shelf.fullname" . }}-shelfd
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "shelf.labels" . | nindent 4 }}
data:
  # Path must match the Dockerfile CMD: /etc/shelfd/shelfd.yaml.
  # The shelfd CLI's own default is /etc/shelfd/config.yaml but the
  # published image pins the former via CMD.
  #
  # Schema reference: shelfd/src/config.rs (`deny_unknown_fields` on
  # every struct, so key spelling matters).
  #
  # Per-pod node.id is overridden at runtime by SHELFD_NODE_ID
  # (fieldRef: metadata.name) — see templates/statefulset.yaml.
  shelfd.yaml: |
    node:
      id: {{ include "shelf.fullname" . }}-placeholder
    http:
      listen: "0.0.0.0:{{ .Values.service.dataPort }}"
      request_timeout: 30s
    control:
      listen: "0.0.0.0:{{ .Values.service.adminPort }}"
    origin:
      bucket: {{ .Values.origin.bucket | quote }}
      region: {{ .Values.origin.region | quote }}
      max_inflight: {{ .Values.origin.pool.maxConnections | int64 }}
    pools:
      metadata:
        dram_bytes: {{ .Values.cache.pools.metadata.sizeBytes | int64 }}
      rowgroup:
        dram_bytes: {{ .Values.cache.pools.rowgroup.dramSizeBytes | int64 }}
        nvme_dir: {{ .Values.storage.mountPath | quote }}
        nvme_bytes: {{ .Values.cache.pools.rowgroup.nvmeSizeBytes | int64 }}
        eviction_policy: {{ .Values.cache.pools.rowgroup.evictionPolicy | default "lru" | quote }}
        {{- with .Values.cache.pools.rowgroup.diskCache }}
        disk_cache:
          {{- with .flushers }}
          flushers: {{ . | int }}
          {{- end }}
          {{- with .bufferPoolSizeBytes }}
          buffer_pool_size_bytes: {{ . | int64 }}
          {{- end }}
          {{- with .submitQueueSizeThresholdBytes }}
          submit_queue_size_threshold_bytes: {{ . | int64 }}
          {{- end }}
          {{- with .admissionBytesPerSec }}
          admission_bytes_per_sec: {{ . | int64 }}
          {{- end }}
        {{- end }}
    admission:
      size_threshold_bytes: {{ mul (int64 .Values.cache.admission.sizeThresholdMiB) 1048576 }}
      pinned_bypass: {{ .Values.cache.admission.pinnedBypass }}
    membership:
      headless_service: {{ include "shelf.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
      dns_refresh: 5s
    head_lru_entries: 10000
    s3_shim:
      enabled: true
      bind_address: "0.0.0.0:{{ .Values.service.s3shimPort }}"
      max_full_object_bytes: 268435456
