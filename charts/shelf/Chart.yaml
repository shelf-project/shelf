apiVersion: v2
name: shelf
description: |
  Shelf — Iceberg-native, row-group-granular read cache for Trino.
  Drop-in S3 endpoint shim that caches Parquet/Iceberg byte-ranges on
  NVMe + DRAM in front of any S3-compatible object store.
  See BLUEPRINT.md §9 for architecture.
