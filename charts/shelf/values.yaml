# Default values for the Shelf Helm chart.
#
# Every non-obvious default below is annotated with its source. Legend:
#   [plan §N]           = agents/out/03-plan.md, section N
#   [BLUEPRINT §N]      = BLUEPRINT.md, section N
#   [ADR-NNNN]          = agents/out/adr/NNNN-*.md
#   [placeholder: ...]  = phase-0 benchmark TBD; value is a starting point
#
# Overlays in values-dev.yaml / values-staging.yaml / values-prod.yaml refine
# these for each environment. Do NOT edit this file to tune production.

# -- Number of shelfd pods. 3 is the v0.5 minimum on rep-2.
# [plan §3 Phase 1 deliverable 7 — "3-pod StatefulSet on the rep-2 pool"]
replicaCount: 3

image:
  # -- Container registry + repository for the shelfd image.
  repository: ghcr.io/shelf-project/shelfd
  # -- Pull policy. IfNotPresent in prod; Always in dev overlay.
  pullPolicy: IfNotPresent
  # -- Image tag. Empty string => .Chart.AppVersion (0.1.0). Pin explicitly
  # in production overlays to avoid "latest tag" drift.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Create a dedicated ServiceAccount. Required for IRSA.
  create: true
  # -- IRSA role ARN for S3 access. Must be set per environment.
  # Example: arn:aws:iam::123456789012:role/shelf-s3-readonly
  annotations: {}
  name: ""

# -- Pod-level annotations. ServiceMonitor handles Prometheus scraping, so
# we do NOT set prometheus.io/scrape here (avoids double-scrape).
podAnnotations: {}

# -- Extra labels merged onto every workload object.
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532         # distroless nonroot UID
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# ---------------------------------------------------------------------------
# Ports — ADR-0004 (HTTP/2 only in v1). No Arrow Flight port in v1.
# ---------------------------------------------------------------------------
service:
  # -- Type of the headless `shelf` Service (clusterIP: None is set in
  # the template; this knob controls only the secondary `shelf-pool`
  # ClusterIP svc used by external clients per SHELF-22).
  type: ClusterIP
  # -- HTTP/2 range-GET data plane (all payload sizes).
  # [ADR-0004 §Decision — "Ship v1 HTTP/2 range-GET only for all payload sizes"]
  dataPort: 9090
  # -- Prometheus metrics endpoint.
  metricsPort: 9091
  # -- S3-compatibility shim (GetObject + HeadObject only).
  # [plan §4 SHELF-22]
  s3shimPort: 9092
  # -- Admin HTTP endpoint for shelfctl (stats, pin, evict, ring, reload).
  # [plan §4 SHELF-23]
  adminPort: 9093
  # NOTE: no Raft/consensus port. ADR-0001 drops Raft entirely; membership
  # is the K8s headless service, pin list is an S3-backed ConfigMap.

# ---------------------------------------------------------------------------
# StatefulSet layout
# ---------------------------------------------------------------------------
statefulset:
  # -- Rolling update: one pod at a time so circuit breakers on Trino
  # workers stay closed for the remaining N-1 pods. [BLUEPRINT §9.5]
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  # -- SHELF-22 — minimum seconds a new pod must be Ready before the sts
  # controller starts terminating the next pod. The k8s svc removes a
  # pod from the endpoint set when readiness fails (which fires before
  # SIGKILL thanks to terminationGracePeriodSeconds=60), so 30s gives
  # the new pod time to re-warm hot keys before its successor is taken
  # out. Set to 0 only if you don't care about cache warm-up between
  # rolling-update steps.
  minReadySeconds: 30

# -- Priority class name. Provisioned by this chart unless overridden.
priorityClassName: shelf-data-plane

# ---------------------------------------------------------------------------
# Resource requests — placeholder values, NOT production-tuned.
# The plan explicitly defers tuning to post-phase-0 benchmark E3
# (h2 throughput per stream on EKS). [plan §2 E3, §3 Phase 0 exit]
# ---------------------------------------------------------------------------
resources:
  # Sizing rule (memory): pod limit MUST exceed
  #   cache.pools.metadata.sizeBytes
  # + cache.pools.rowgroup.dramSizeBytes
  # + ~10 GiB of headroom for Rust runtime, the S3 connection pool's
  #   in-flight response buffers, page cache for NVMe writes, and
  #   tokio task stacks.
  # Violating this rule causes the kernel OOM-killer to terminate the
  # pod under load — see post-mortem in
  #   shelfd/docs/runbooks/2026-04-shelf-2-oom.md.
  requests:
    # [BLUEPRINT §9.1 — "requests: {cpu: 8, memory: 48Gi}"]
    cpu: "8"
    memory: "48Gi"
  limits:
    # 2× requests is a placeholder to absorb bursty Foyer write batches.
    # [placeholder: phase-0 benchmark TBD — ticket SHELF-18]
    cpu: "16"
    memory: "64Gi"

# ---------------------------------------------------------------------------
# Storage — NVMe PVC per pod.
# ---------------------------------------------------------------------------
storage:
  # -- StorageClass. Prefer local-nvme; ebs-gp3-wffc is the fallback.
  # [plan §4 SHELF-18 "local NVMe StorageClass (preferred) or ebs-gp3-wffc (fallback)"]
  storageClassName: local-nvme
  # -- Disk size per pod. rc.8 / K1 (ADR-0042) lowered the OSS
  # default from 240 GiB to 60 GiB based on the May 1 2026 TPC-H
  # SF100 benchmark showing peak per-pod NVMe utilisation of
  # 7.82% (~18.77 GiB on a 240 GiB hybrid pool) — the 20 GB
  # working set fit almost entirely in the 11 GiB DRAM rowgroup
  # pool. 60 GiB leaves ~3× headroom over the observed peak while
  # cutting the shelf-pool gp3 EBS line ~75%.
  #
  # Operators with large hot working sets (>30 GB per pod;
  # high-traffic dashboards, multi-TB Iceberg scans) should raise
  # this via overlay values back to 240Gi (or higher). See
  # benchmarks/results/2026-05-01/4hr/COMPREHENSIVE-RESULTS.md
  # and agents/out/adr/0042-rc8-nvme-sizing-rule.md.
  #
  # Existing deployments with 240 GiB PVCs are unaffected by a
  # helm upgrade — StatefulSet volumeClaimTemplates are immutable
  # post-create. Downsize requires an operator decision
  # (kubectl patch pvc … then rebind; ADR-0042 "Migration").
  #
  # Latency-first / large working set: merge the optional overlay
  # `charts/shelf/examples/values-latency-priority.yaml` (500Gi +
  # matched `nvmeSizeBytes`) on top of your env values when rowgroup
  # hit ratio is low at full NVMe util and S3 GET-variable spend is
  # high — validate `allowVolumeExpansion` on your StorageClass before
  # expanding existing PVCs.
  size: 60Gi
  mountPath: /var/lib/shelf

# ---------------------------------------------------------------------------
# Cache configuration — two pools (ADR-0008).
# ---------------------------------------------------------------------------
cache:
  pools:
    metadata:
      # -- DRAM-only, SIEVE. Holds metadata.json, manifest lists,
      # manifests, Parquet footers, page indexes. [ADR-0008 §Decision]
      tier: dram
      policy: FrozenHot
      sizeBytes: 5368709120  # 5 GiB absolute (not a percentage)
    rowgroup:
      # -- Hybrid DRAM + NVMe. Holds row-group byte-ranges.
      # [ADR-0008 §Decision, ADR-0009]
      tier: hybrid
      # -- In-memory eviction policy for the hybrid pool's DRAM tier.
      # Allowed: `lru` | `s3_fifo` | `lfu` | `fifo`.
      #
      # SHELF-E1b — defaults to LRU because S3-FIFO's "small queue →
      # main queue → disk" promotion path keeps one-shot reads
      # (Metabase admin, ad-hoc BI) off NVMe entirely: items expire
      # from the small queue before earning promotion, so
      # `shelf_disk_bytes_used` stays at zero indefinitely. LRU
      # flows every memory eviction through to the disk ring, so the
      # NVMe tier actually fills under BI workloads.
      #
      # ADR-0009 originally pinned this to S3-FIFO for scan
      # resistance; flip back to `s3_fifo` here when the SHELF-26
      # replay harness shows a per-policy hit-ratio gain on your
      # workload.
      evictionPolicy: lru
      # `policy` is retained as a human-readable hint for ops
      # dashboards. Source of truth for shelfd is `evictionPolicy`.
      policy: LRU
      # -- DRAM portion of the hybrid pool, in bytes. MUST satisfy
      # `metadata.sizeBytes + rowgroup.dramSizeBytes + (origin.pool.maxConnections × 32 MiB)
      # + cache.pools.rowgroup.diskCache.submitQueueSizeThresholdBytes
      # + ~3 GiB Rust runtime / tokio stacks / jemalloc fragmentation`
      # `<= node.allocatableMemory`.
      # On a 4xlarge alluxio NodePool that is ~27.3 GiB allocatable.
      #
      # 11 GiB DRAM (default since SHELF-21f, 2026-04-29) leaves
      # 27.3 - (5 + 11 + 4 + 1 + 3) = ~3 GiB of headroom. The
      # previous 14 GiB default left zero headroom and produced
      # repeated near-OOM RSS peaks (27–29 GiB observed on shelf-0/1
      # 2026-04-29 04:00 IST) and one OOMKill (shelf-1, exit 137,
      # 06:40 IST) under sustained read load even with the SHELF-21e
      # LODC back-pressure module engaged. See
      #   shelfd/docs/runbooks/2026-04-shelf-2-oom.md
      #   shelfd/docs/runbooks/2026-04-shelf-1-oom.md
      # and the 2026-04-29 LODC regression entry in CHANGELOG.md.
      dramSizeBytes: 11811160064   # 11 GiB
      nvmeSizeBytes: 64424509440   # 60 GiB; matches storage.size (rc.8 K1, ADR-0042)
      # -- Foyer Large-Object Disk Cache (LODC) pipeline knobs.
      #
      # Post-mortem 2026-04-27: shelf-1 was OOM-killed (exit 137) at
      # 14:30 UTC inside a 32 GiB pod *limit* on a 27.3 GiB *node
      # allocatable*. Foyer 0.12's stock LODC defaults are
      # `flushers=1` and `buffer_pool_size=16 MiB` (submit-queue
      # threshold = 32 MiB). With shelfd's 256 in-flight × ~32 MiB
      # Parquet rowgroup workload, a single flusher cannot drain to
      # NVMe fast enough — proven by the
      #   `[lodc] submit queue overflow, new entry ignored`
      # warnings in the previous-container logs. RSS climbs in the
      # submit queue + DRAM cache + S3 in-flight buffers
      # simultaneously and the kernel kills the pod before the
      # container limit is reached. See
      #   shelfd/docs/runbooks/2026-04-shelf-1-oom.md
      #
      # Defaults below match the production overlay so the OSS
      # chart is safe out of the box for Trino-class workloads.
      # All three knobs are optional — leaving any field unset
      # falls back to Foyer's own default.
      diskCache:
        # SHELF-21f (2026-04-29): doubled flushers 4 → 8 and bumped
        # bufferPool 256 MiB → 384 MiB. The 2026-04-28 helm rev-16
        # soak proved the 4-flusher / 256 MiB combination was
        # insufficient under sustained read load — the LODC submit
        # queue stayed pinned at the SHELF-21e 80% watermark
        # (~860 MiB) for hours on shelf-2/3 (verified via
        # `shelf_lodc_inflight_bytes` flat-line at 859 053 141 B for
        # the entire 6 h window 2026-04-29 03:00–09:00 IST) while
        # the shelf-0/1 pods OOMed under the same combination of
        # DRAM caps + S3 in-flight buffers. With 8 flushers the
        # aggregate gp3 drain rate is closer to ~1 GiB/s on a 4xlarge
        # alluxio NodePool, which keeps the inflight gauge below
        # the watermark in steady state and therefore stops the
        # `shelf_lodc_drops_total` counter from climbing.
        flushers: 8                       # was 4 (was Foyer default 1)
        bufferPoolSizeBytes: 402653184    # 384 MiB; was 256 MiB (was Foyer default 16 MiB)
        submitQueueSizeThresholdBytes: 1073741824  # 1 GiB; bounds RSS growth from the LODC pipeline
        # -- DEPRECATED (SHELF-21e, preview-10): `admissionBytesPerSec`
        # is silently ignored at runtime. The underlying Foyer
        # `RateLimitPicker` added latency to all writes regardless of
        # queue pressure, so it was removed in favor of the level-based
        # backpressure in `LodcBackpressure`.
        #
        # The **actual** admission throttle is now controlled by the
        # nested `admission:` block below (SHELF-29). By default it is
        # ENABLED at 200 MiB/s — operators do NOT need to uncomment
        # anything to get rate-limited admission. To disable it, set
        # `diskCache.admission.enabled: false` in your overlay.
        #
        # This field is kept only for YAML-schema backward compat.
        # admissionBytesPerSec: 209715200  # DEPRECATED — no effect
        #
        # -- SHELF-29 — Independent-queue admission rate-limiter.
        # The token-bucket refill rate defaults to 200 MiB/s, matching
        # the gp3 EBS baseline. Operators on faster NVMe can raise
        # `targetBytesPerSec`; on slower disks, lower it to stop
        # `shelf_lodc_drops_total{reason="submit_queue_overflow"}`.
        #
        # Default values are applied by shelfd when this block is absent,
        # so the throttle is ON by default without any YAML config.
        # Uncomment and tune only if you need to change from defaults:
        # admission:
        #   enabled: true              # default: true
        #   targetBytesPerSec: 209715200  # default: 200 MiB/s
        #   maxBurstBytes: 268435456   # default: 256 MiB
        #   rssThrottle:
        #     enabled: true            # default: true (A1 rc.7 RSS-aware)
        #     rssTargetBytes: 42949672960  # default: 40 GiB

      # -- B1 — opt-in zstd compression of cached row-group payloads.
      #
      # When `enabled` is `true`, every row-group byte range is
      # zstd-encoded before it lands in the Foyer DRAM tier (and
      # therefore also before it reaches the NVMe tier on
      # promotion). On real Iceberg / Parquet rowgroup data the
      # ratio is ~1.4–2.5× — the columnar payloads are already
      # dictionary-encoded but the per-page headers + repeated
      # string values still compress meaningfully under zstd-3.
      #
      # At constant pod count this lifts hit ratio by ~5–10 pp by
      # making the same NVMe budget hold more keys. At constant
      # hit ratio it makes the StatefulSet shrinkable by one pod
      # (~$200/mo per replica saved on the alluxio NodePool).
      #
      # On-disk safety: shelfd writes a `.shelf-compression.json`
      # marker file inside `storage.mountPath` on first boot. If
      # the operator later flips this knob without wiping the NVMe
      # ring, shelfd aborts at boot with a clear "wipe NVMe to
      # switch compression mode" error rather than corrupt-read
      # silently. Switch playbook:
      #   1. Scale the StatefulSet to 0
      #   2. `kubectl exec` into a maintenance pod and `rm -rf
      #      <storage.mountPath>/*`
      #   3. Toggle this flag, `helm upgrade`, scale back up
      compression:
        enabled: false
        # zstd level. `3` is zstd's own default; level 1–9 is the
        # practical range (higher levels gain <5% ratio at 2-4×
        # CPU cost). Level >= 1 and <= 22 is the hard validator
        # range.
        level: 3
        # Frames smaller than this are stored uncompressed (the
        # 13-byte zstd frame overhead dominates). Defaults to 256.
        minSizeBytes: 256

  admission:
    # -- Refuse inserts for objects > 1 GiB unless pinned. [ADR-0003]
    sizeThresholdMiB: 1024
    # -- Pinned objects bypass the size threshold. [plan §4 SHELF-25]
    pinnedBypass: true
    # -- Learned admission disabled in v1. [ADR-0003]
    model:
      enabled: false
      # S3 path for the ONNX/LightGBM model when/if enabled. [plan §3 Phase 4]
      s3Uri: ""
      # Age after which the admission model is stale; alert fires.
      # [plan §2 E4, agents/8-operator.md §Pass-2 ShelfAdmissionModelStale]
      maxAgeHours: 48

  pinList:
    # -- S3-backed ConfigMap with the pin list. [ADR-0001, plan §4 SHELF-24]
    # Set to your own bucket; the chart does not assume a default location.
    # Example: s3://my-org-shelf-config/pin_list.json
    s3Uri: ""
    # -- Poll interval. SIGHUP also triggers a reload. [plan §4 SHELF-24]
    reloadIntervalSeconds: 900

  # ---------------------------------------------------------------------------
  # SHELF-40 — `shelf_s3_dollars_saved_total` cost-saved counter.
  #
  # The counter publishes one IntCounter series per
  # `(region, outcome ∈ {hit_memory, hit_disk, peer})`. The unit is
  # **integer cents** (not dollars, not micro-cents) because the
  # underlying Prometheus type is i64 and we want the dashboard
  # math to be `cents × 0.01 = dollars` everywhere — no hidden
  # multipliers. The companion gauge
  # `shelf_s3_dollars_saved_rate_cents_per_sec` is computed by
  # shelfd as a 60 s rolling rate so dashboards don't need to
  # `rate(... [60s]) * 0.01` in PromQL.
  #
  # All coefficients below default to the `us-east-1` published
  # AWS price list (see `crates/shelf-cost/README.md` for the
  # exact pricing-page citations and the "stale price refresh"
  # runbook). Operators in `ap-south-1` flip `region: ap-south-1`
  # in their values overlay; the `ap-south-1` preset is wired
  # into the crate with the same citation discipline.
  # Region-specific overlays go in your own values file, not in
  # this chart default.
  # ---------------------------------------------------------------------------
  cost:
    # -- Master switch. Default ON; flip to false to silence both
    # the counter and the rolling-rate updater task. The wiring
    # overhead with the counter on is one atomic add per cache
    # hit — see `crates/shelf-cost/benches/dollars_saved_atomic_add.rs`.
    enabled: true
    # -- AWS region identifier. Picks the matching preset from the
    # `shelf-cost` crate. Supported presets ship with citations:
    # `us-east-1` (OSS default) and `ap-south-1` (Mumbai overlay
    # default). Any other region requires the operator to supply
    # explicit `*_micro_cents_*` overrides below with citations in
    # their own values overlay.
    region: us-east-1
    # -- Override for the per-GET request rate, in micro-cents per
    # request (1 cent = 1_000_000 µ¢). Unset ⇒ inherit the
    # regional preset. The us-east-1 / ap-south-1 presets store
    # `40 µ¢/req` (= $0.0004 / 1 000 GETs).
    # getRequestMicroCents: 40
    # -- Override for the same-AZ data-transfer rate (µ¢/GiB,
    # `GiB = 2^30 bytes`). AWS lists same-AZ traffic as $0.00 in
    # both us-east-1 and ap-south-1, so the preset is `0`.
    # sameAzMicroCentsPerGib: 0
    # -- Override for the cross-AZ data-transfer rate (µ¢/GiB).
    # `$0.01/GiB ⇒ 1_000_000 µ¢/GiB` exact (no rounding residue).
    # crossAzMicroCentsPerGib: 1000000
    # -- Override for the NAT-gateway data-processing rate
    # (µ¢/GiB). Both presets store `4_500_000` µ¢/GiB exactly
    # (= `$0.045/GiB`).
    # natProcessingMicroCentsPerGib: 4500000
    # -- Fraction of cache-saved bytes that *would have* exited
    # via NAT had the cache missed, expressed as basis points
    # (0..=10_000; `10_000` = 100%). Defaults to `0` (S3 VPC
    # gateway endpoint assumed). Setting this is the operator's
    # affirmation that their VPC topology actually charges NAT
    # for the modelled traffic; without it, the NAT term
    # contributes zero cents.
    # natTraversalBasisPoints: 0
    # -- A4 (rc.7) — Amortized shelf-pool cost in dollars per hour.
    # **Unset by default** (anti-overclaim guard). When unset, the
    # net counter `shelf_s3_dollars_saved_net_total` does not
    # publish — procurement-side numbers must be authoritative,
    # and silently defaulting to zero would inflate net savings by
    # the full pool cost. The companion gauge
    # `shelf_pool_amortized_dollars_per_hour` is always exposed and
    # reads `0` when unset so dashboards can flag the misconfig.
    #
    # Reference figure: a 6-pod shelf pool on `m5a.4xlarge` in
    # `ap-south-1` runs `6 × $0.864/hr ≈ $5.18/hr`. Verify against
    # your actual EKS bill (Spot vs On-Demand vs Reserved Instances
    # all change this) before merging an overlay value.
    # amortizedDollarsPerHour: 5.18

  # ---------------------------------------------------------------------------
  # SHELF-42 — A/B query tagging receive path.
  #
  # The Trino plugin attaches a URL-encoded JSON A/B tag to every
  # shelf-bound HTTP request via the `X-Shelf-Tag` header. shelfd
  # validates the header, enforces a per-pod cardinality cap, and
  # exposes the resulting `tag` label on companion metrics:
  #   shelf_hits_by_tag_total
  #   shelf_misses_by_tag_total
  #   shelf_s3_shim_response_bytes_by_tag_total
  #   shelf_ab_tag_cap_violations_total
  #
  # Default-off so freshly deployed OSS pods do not expose tag
  # cardinality surface area until the operator has sized Prometheus
  # retention for the cap. Penpencil overlay flips `enabled: true`.
  # Spec: docs/contracts/ab-tag.md.
  # ---------------------------------------------------------------------------
  abTag:
    # -- Master switch on the receive side. Trino plugin forwarding
    # is always on (metadata only, no measurable runtime cost).
    enabled: false
    # -- Per-pod cardinality cap. Tags above the cap fold into the
    # sentinel label `other` and bump
    # `shelf_ab_tag_cap_violations_total{reason="cardinality"}` once
    # per (window, distinct offending tag).
    maxDistinctTags: 16
    # -- Cap-enforcement window. Defaults to 60 s — long enough to
    # bracket a 30 s Prometheus scrape, short enough that a stale
    # cohort eventually rolls out of the sentinel state.
    scrapeWindow: 60s

  # -- SHELF-50 — Decoded-metadata in-process LRU. Holds parsed
  # `ManifestFile` and `ParquetMetaData` keyed by S3 ETag, so warm
  # planning-path reads skip the Avro / Thrift deserialise step.
  # Off by default because v1 ships the infrastructure ahead of any
  # consumer (downstream tickets SHELF-46 / SHELF-37 / SHELF-47 flip
  # it on once they consume the decoded data). Memory budget in v1
  # is by entry count only; per-entry size tracking is a SHELF-50b
  # follow-up — see
  # `shelfd/docs/design-notes/SHELF-50-decoded-metadata-cache.md`.
  decodedMeta:
    enabled: false
    # -- Max resident decoded `ManifestFile` entries. ~32–256 KiB
    # per entry on production manifests, so a saturated cache at
    # 10 000 entries holds ~320 MiB–2.5 GiB worst case.
    maxManifestEntries: 10000
    # -- Max resident decoded `ParquetMetaData` entries. Smaller
    # per-entry footprint (~4–32 KiB).
    maxFooterEntries: 10000

  # -- SHELF-46 — Bloom-aware footer admission.
  #
  # When enabled, shelfd inspects every shim GET and forces reads
  # that look like a Parquet footer (last `minFooterBytes` of the
  # object) OR a known bloom-filter block (bytes whose
  # `(offset, length)` matches a `(bloom_filter_offset,
  # bloom_filter_length)` pair previously parsed from this object's
  # footer for the current ETag) into the metadata pool. Column
  # data and dictionary pages keep going through the size-threshold
  # admission path on the rowgroup pool.
  #
  # Why off by default
  # ------------------
  # The classifier is fail-open and cheap (one atomic + a HashMap
  # lookup) but the policy change is observable — once flipped on,
  # the metadata pool's churn signature changes (more inserts,
  # smaller average value size). Operators should leave this off
  # until SHELF-49 (range coalescing) and B1 (zstd metadata
  # compression) have soaked, then flip it on with a 24h canary on
  # one rep before extending to the rest.
  #
  # Trino caveat
  # ------------
  # Trino + Iceberg's JVM-local `MemoryFileSystemCache` shadows
  # shelfd for warm metadata reads, so the bloom hit counters stay
  # at 0 unless the catalog is configured with
  # `iceberg.metadata-cache.enabled=false` (or the JVM is cold).
  # See `shelfd/docs/design-notes/SHELF-46-bloom-aware-footer-admission.md`.
  #
  # [plan §4 SHELF-46, ADR-0003 size-threshold admission, ADR-0011
  # content-addressed keys]
  bloom:
    # -- Master switch. Default off — flip on as a canary after
    # SHELF-49 + B1 are stable.
    enabled: false
    # -- Cap on the in-process `etag → Vec<BloomBlockRange>` LRU.
    # Worst case is ~8 bytes/range × ~10 ranges/file × this cap, so
    # 50 000 entries ≈ 4 MiB RSS. Bump if your working set has more
    # distinct Iceberg snapshots in flight than this; lower if your
    # pod has tight RSS budget.
    maxIndexEntries: 50000
    # -- Trailing-byte heuristic for footer detection. Any GET whose
    # `(offset + length) >= total_size` AND `length <= minFooterBytes`
    # is classified as a Footer read. The Parquet 1.x spec puts the
    # footer length + PAR1 magic in the last 8 bytes; production
    # Trino + Iceberg footers we have observed range from 2 KiB to
    # ~48 KiB. 64 KiB is a comfortable upper bound that still lets
    # the parser walk the trailing block once it has the bytes.
    minFooterBytes: 65536

  # ---------------------------------------------------------------------------
  # A6 (rc.7) — Cooperative peer-admission probabilistic gate.
  #
  # When a non-primary pod fetches bytes from the HRW primary peer
  # (SHELF-23 `peer_or_origin_fetch`), today the secondary also caches
  # the response in its own Foyer pool — *defensive replication*.
  # Under HRW skew that doubles NVMe pressure on hot keys for little
  # benefit (the primary stays warm). A6 gates the secondary admit
  # with probability `1 / replicationFactor`.
  #
  # `enabled = false` is the safety default — a freshly deployed pod
  # behaves identically to pre-A6 (every peer-fetched byte still
  # admits). Operators flip the switch per-cluster after the
  # `shelf_coop_peer_admits_total` / `shelf_coop_peer_drops_total`
  # dashboards have been sized.
  #
  # `replicationFactor` is the intended in-cluster replication factor
  # per object:
  #   1 ⇒ admit with probability 1.0 (no behaviour change vs pre-A6)
  #   2 ⇒ admit with probability 0.5 (defensive 2× replication;
  #        recommended starting point)
  #   N ⇒ admit with probability 1/N (cluster-wide replication factor N)
  # `0` is treated as `1` defensively (no admit-everything → admit-nothing
  # foot-gun on an accidental YAML typo).
  #
  # Origin admits are unchanged — A6 ONLY gates `FetchSource::Peer`.
  # Reads are untouched. Composition with the existing admit chain
  # (drain → policy → LODC → rate-limiter → A6) keeps each gate's
  # blast radius observable independently via
  # `shelf_admissions_total{decision=...}`.
  # See ADR-0037.
  # ---------------------------------------------------------------------------
  coopAdmission:
    # -- Master switch. Default OFF; turn on per-cluster after the
    # operator dashboards have been sized for the new counters.
    enabled: false
    # -- Intended in-cluster replication factor per object. `2` is
    # the recommended starting point once the gate is enabled.
    replicationFactor: 2

  # ---------------------------------------------------------------------------
  # B3 (rc.7) — Intermediate-table opt-out admission gate.
  #
  # dbt batch + scratch tables on a busy replica churn through cache:
  # they are written, read once, and snapshot-expire in 1-3 days —
  # well before a cache admission has paid itself back. B3 refuses
  # admits for tables flagged transient so the saved NVMe + write-
  # amplification stay on the hot tables that actually benefit.
  #
  # `enabled = false` is the safety default. A freshly deployed pod
  # behaves identically to pre-B3 (the gate is a strict no-op).
  # Operators flip the switch per-cluster after the
  # `shelf_transient_refusals_total` /
  # `shelf_transient_decisions_cached` /
  # `shelf_transient_refresh_errors_total` panels have been added.
  #
  # Decision sources, highest priority first:
  #   1. `overrides[<schema.table>]` — explicit operator override.
  #   2. `shelf.cache-policy = transient` Iceberg table property.
  #   3. `history.expire.max-snapshot-age-ms` < `transientThreshold`.
  # Tables not matching any source admit normally (fail-open).
  #
  # B3 is admit-only: reads are never gated. Composes with the rest
  # of the chain (drain → B3 → policy → LODC → rate → coop) and each
  # gate's blast radius stays observable on
  # `shelf_admissions_total{decision=...}`. See ADR-0038.
  # ---------------------------------------------------------------------------
  transientAdmission:
    # -- Master switch. Default OFF; turn on per-cluster after the
    # operator dashboards have been sized for the new counters.
    enabled: false
    # -- Tables whose Iceberg `history.expire.max-snapshot-age-ms`
    # is below this duration are flagged transient. Default 7 days,
    # matching the typical dbt batch + scratch retention window.
    transientThreshold: 168h
    # -- How long a refreshed per-table decision stays authoritative
    # before the next admission triggers a background refresh.
    # Default 10 min; table policy changes are rare so a long TTL
    # keeps the metadata.json fetch budget low.
    decisionCacheTtl: 10m
    # -- Explicit per-table overrides, keyed on `<schema>.<table>`.
    # Wins over anything derived from metadata.json. Use this to
    # force-refuse known scratch namespaces without waiting for the
    # property-based detection to land. Each value is one of
    # `admit` | `refuseTransient`.
    # Example shape (do not commit live; bucket / namespace names
    # belong in operator overlays):
    #   overrides:
    #     scratch.tmp_join_a: refuseTransient
    #     analytics.gold_revenue: admit
    overrides: {}

  # ---------------------------------------------------------------------------
  # K2 (rc.8) — HRW-skew-aware autoscaler integration.
  #
  # HRW pins each (bucket, key, etag) to a single shelf pod. When a
  # hot key family (e.g. all Metabase queries hashing to the same
  # ETag prefix) lands on one primary, that pod absorbs the fan-out
  # while peers stay near-idle. Autoscaling on aggregate pool QPS
  # hides this — the cluster average looks healthy even when one pod
  # is pegged. K2 publishes per-pod load + cluster-wide skew so HPA
  # / KEDA can react to the imbalance, not just the average.
  #
  # Default ON. Hot-path cost is one atomic `fetch_add(Relaxed)` per
  # accepted s3-shim request; the background loop runs at 30 s
  # cadence. The `?include=pod_load` opt-in on `/stats` keeps Agent
  # 5's HRW-weighting wire payload byte-identical with pre-K2.
  #
  # Drop-in `KEDA ScaledObject` example (targeting >150 bps = 1.5×
  # skew for scale-up) at `examples/keda-scaledobject-skew-aware.yaml`.
  # See ADR-0042.
  # ---------------------------------------------------------------------------
  podLoad:
    # -- Master switch. Default `true`. Flip to `false` to disable
    # the metric publication AND the hot-path bookkeeping (the
    # `record_request` call short-circuits on the `enabled` check).
    # The aggregator's background loop also exits cleanly when
    # disabled, so a config flip + rolling restart is a clean revert.
    enabled: true
    # -- Trailing window over which `shelf_pod_load_qps` is computed.
    # 60 s matches the `shelf_rolling_hit_ratio_bps` precedent —
    # smooth enough to absorb per-query spikes, fast enough to
    # surface a real shift in ~ 2 minutes.
    window: 60s
    # -- How often the aggregator wakes, snapshots its cumulative
    # request counter into the rolling window, probes peers'
    # `/stats?include=pod_load`, and republishes the gauges. 30 s
    # gives the autoscaler two ticks per typical HPA cycle.
    aggregationInterval: 30s
    # -- Hard wall-clock deadline for one peer's `/stats?include=pod_load`
    # probe (HTTP request + JSON decode). A peer that misses the
    # deadline drops out of this round AND increments
    # `shelf_pod_load_probe_errors_total`. Default 2 s.
    probeTimeout: 2s

  # ---------------------------------------------------------------------------
  # SHELF-45 — compaction-aware re-warm reactor.
  #
  # When an Iceberg table is compacted (`ALTER TABLE … EXECUTE optimize`,
  # `expire_snapshots`, `remove_orphan_files`), shelf's content-addressed
  # keys (per ADR-0011) automatically invalidate, but every key the next
  # query asks for is cold — which becomes the morning's largest S3
  # spike. The reactor watches the Iceberg metadata stream, detects
  # compaction-class events, and proactively re-warms the new file paths
  # into the rowgroup pool BEFORE the cold-miss thundering herd hits.
  #
  # Default OFF: the reactor needs the SHELF-37 listener (or an
  # equivalent metadata polling worker) plumbed in as a producer before
  # it sees real events. Enabling it without an event source is
  # harmless — the reactor parks on an empty channel.
  #
  # Rate-limit math: 50 MiB/s/pod × 60 s = ~3 GiB/min/pod re-warm
  # bandwidth, which absorbs a 5-10 GiB compaction in a few minutes
  # without ever crowding out client reads (origin.pool.maxConnections
  # = 128 worst-case concurrent client GETs ≫ 4 reactor GETs).
  # ---------------------------------------------------------------------------
  rewarm:
    # -- Master switch. Off by default; flip after the SHELF-37 listener
    # (PR #66) is plumbed in as the event producer.
    enabled: false
    # -- Token-bucket refill rate, bytes/sec. 50 MiB/s/pod default.
    # Set 0 to pause re-warm without disabling the loop (kill-switch).
    maxBytesPerSec: 52428800
    # -- Maximum concurrent in-flight re-warm fetches per pod. 4 keeps
    # the re-warm semaphore at least 4× smaller than the client budget
    # (origin.pool.maxConnections = 128 in chart default). The
    # property test in `shelfd/src/compaction_rewarm.rs` pins the
    # invariant.
    maxConcurrentFiles: 4
    # -- Bounded mpsc capacity for the snapshot-event queue. Excess
    # events are dropped with `outcome="dropped_rate_limit"` rather
    # than back-pressuring the producer.
    queueCapacity: 1024
    # -- Snapshot lag tolerance: if the producer's `committed_at`
    # exceeds this, a warning is logged and the lag is observed via
    # `shelf_rewarm_lag_seconds`. Older snapshots still get re-warmed.
    snapshotLagToleranceSecs: 120
    # -- A3 (rc.7) — `metadata.json` polling cadence per watched
    # table (seconds). The cheap path (304 fast-path) is one S3 GET
    # per table per interval; 30 s × 100 tables ≈ 12 GETs/min,
    # trivial. See ADR-0036.
    pollIntervalSecs: 30
    # -- A3 (rc.7) — hard cap on bytes prefetched per detected
    # snapshot, per table. Defaults to 5 GiB (5368709120). Defends
    # against runaway prefetch on a 200 GiB `expire_snapshots`
    # rewrite. Excess increments `shelf_rewarm_bytes_capped_total`.
    maxBytesPerSnapshot: 5368709120
    # -- A3 (rc.7) — list of Iceberg tables to watch. Each entry
    # is `{ bucket, keyPrefix, label }`. The OSS chart ships an
    # empty list — operators populate this from their `gen_pin_list`
    # top-N output before turning `enabled: true`. Bucket names
    # belong in operator overlays only, not here.
    # Example shape (do not commit live):
    #   tables:
    #     - bucket: my-org-data-lake
    #       keyPrefix: warehouse/cdp/datamart/silver_user_events
    #       label: cdp.datamart.silver_user_events
    tables: []

# ---------------------------------------------------------------------------
# Origin (S3) client — [plan §4 SHELF-05]
# ---------------------------------------------------------------------------
origin:
  # -- Origin S3 bucket (the data Trino reads). Required.
  # Example: my-org-data-lake
  bucket: ""
  # -- AWS region of the origin bucket.
  region: us-east-1
  # -- Pooled HTTP client. Per-prefix sharding lands in Phase 3 (SHELF-??).
  # [plan §3 Phase 3 deliverable 6 — "Per-prefix connection pools"]
  pool:
    # SHELF-21f (2026-04-29): lowered 256 → 128 after the LODC
    # regression on shelf-0/1. Each in-flight S3 GET reserves a
    # receive buffer for up to one ~32 MiB rowgroup, so
    # maxConnections × 32 MiB is the origin-pool RSS worst case.
    # Keeping this at 128 (≤ ~4 GiB worst case) lets the
    # 5 GiB metadata + 11 GiB rowgroup + 1 GiB LODC + ~3 GiB
    # runtime budget fit under the 27.3 GiB node-allocatable
    # ceiling on the 4xlarge alluxio NodePool. Operators on
    # bigger nodes can raise this carefully — re-verify the RSS
    # budget rule of thumb in the comment above
    # `cache.pools.rowgroup.dramSizeBytes` before doing so.
    maxConnections: 128
    idleTimeoutSeconds: 60

# ---------------------------------------------------------------------------
# Trino integration — the NetworkPolicy needs to know which labels are
# allowed to connect to shelfd. [BLUEPRINT §9.5, agents/8-operator.md §Pass-1]
# ---------------------------------------------------------------------------
trino:
  # -- Namespace where Trino coordinators & workers run.
  namespace: trino
  # -- Label selector on Trino coordinator pods allowed to ingress.
  coordinatorPodLabels:
    app: trino
    component: coordinator
  # -- Label selector on Trino worker pods allowed to ingress.
  workerPodLabels:
    app: trino
    component: worker

networkPolicy:
  # -- Master switch. Enabled by default — tighten now, loosen later is hard.
  enabled: true
  # -- Additional ingress selectors (e.g. shelfctl operator pods, benchmark
  # harness). Appended to the Trino coordinator/worker selectors.
  extraIngressFrom: []
  # -- Extra egress rules. Default egress = S3 (443) + DNS + metrics.
  extraEgress: []

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
serviceMonitor:
  # -- kube-prometheus-stack ServiceMonitor. [agents/8-operator.md §Pass-2]
  enabled: true
  # -- Scrape interval.
  interval: 30s
  scrapeTimeout: 10s
  # -- Additional labels required by the Prometheus CR selector. Check with
  # `kubectl get prometheus -A -o yaml | grep serviceMonitorSelector` in
  # your cluster. The kube-prometheus-stack default is:
  additionalLabels:
    release: kube-prometheus-stack

# ---------------------------------------------------------------------------
# Disruption budget — [agents/8-operator.md §Pass-1 PDB "max 1 unavailable"]
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# ---------------------------------------------------------------------------
# Priority class — between batch (0) and cluster-critical
# (system-cluster-critical = 2e9). [agents/8-operator.md §Pass-1]
# ---------------------------------------------------------------------------
priorityClass:
  create: true
  value: 100000
  globalDefault: false
  description: |
    Shelf data-plane pods: higher than batch workloads so they survive
    node pressure, lower than cluster-critical so kube-system wins any
    tie. Numerical value is a placeholder; coordinate with SRE before
    reusing or changing across clusters.

# ---------------------------------------------------------------------------
# Scheduling
# ---------------------------------------------------------------------------
nodeSelector:
  # -- Dedicated node pool label. Empty by default so the chart installs
  # on any cluster; set this to pin shelfd onto a specific node pool.
  {}

tolerations: []

affinity:
  # -- Anti-affinity across AZs for HA. [plan §4 SHELF-21]
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: shelf

# ---------------------------------------------------------------------------
# Probes. /healthz is lightweight; /readyz blocks until Foyer init + first
# S3 HEAD probe succeed. [plan §4 SHELF-02]
# ---------------------------------------------------------------------------
probes:
  # -- SHELF-22 fast-follow: a startupProbe with a permissive grace
  # window suspends liveness/readiness until shelfd finishes Foyer NVMe
  # recovery (observed ~64 s on 240 GiB hybrid pool, can spike to 120 s
  # on cold cache after a node-replace). Without this, the rolling
  # restart in helm rev 23 produced 2 in-pod restarts on shelf-1
  # (Exit 137, liveness probe failed) because Foyer recovery raced past
  # the 75 s liveness grace (15 s initialDelay + 3 × 20 s period). After
  # the startupProbe succeeds, the normal liveness/readiness probes
  # take over. Set failureThreshold=0 to disable (legacy behaviour).
  startup:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 60   # 60 × 5 s = 5 min total grace
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6  # generous during Foyer NVMe replay

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  # -- Log level: trace / debug / info / warn / error.
  level: info
  # -- JSON log format for cluster log pipelines.
  format: json

# Environment-variable overrides. Useful in dev for pointing shelfd at a
# MinIO endpoint or injecting AWS_* credentials. Prefer IRSA in prod.
extraEnv: []

# ---------------------------------------------------------------------------
# Grafana dashboards + alerts — [plan §4 SHELF-27]
#
# The shelf chart ships its dashboard JSON and Prometheus alert rules as
# ConfigMaps picked up by the kube-prometheus-stack Grafana sidecar
# (label selector is configurable below). Files live under
# `charts/shelf/grafana/` and are Files.Get'd into the ConfigMap at
# render time, so editing the JSON / YAML is a pure content change with
# no template surgery.
# ---------------------------------------------------------------------------
grafana:
  # -- Render the dashboard + alerts ConfigMaps. Opt-in so clusters
  # without the kube-prometheus-stack Grafana sidecar don't end up with
  # orphan ConfigMaps. [plan §4 SHELF-27]
  enabled: true
  dashboardLabel:
    # -- Label key the Grafana sidecar selects on (default: grafana_dashboard).
    key: grafana_dashboard
    # -- Label value the sidecar matches (default: "1").
    value: "1"
  alertLabel:
    # -- Label key the alert sidecar selects on. Kept separate from the
    # dashboard label so alerts can be disabled without hiding the
    # dashboard (set .Values.grafana.enabled=false to disable both).
    key: grafana_alert
    value: "1"
