# Production overlay — rep-2 shape per plan §3 Phase 5.
#
# Target: penpencil rep-2 EKS cluster. Pinned image; anti-affinity across
# ≥ 2 AZs; NetworkPolicy on; PDB on; kube-prometheus-stack scraping on.

replicaCount: 5  # [plan §3 Phase 5 "5-pod StatefulSet across ≥ 2 AZs (on-demand, not spot)"]

image:
  pullPolicy: IfNotPresent
  # CI pins to an immutable digest-based tag per release.
  tag: "0.1.0"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/shelf-prod-s3

resources:
  requests:
    cpu: "8"
    memory: "48Gi"
  limits:
    cpu: "16"
    memory: "56Gi"

storage:
  storageClassName: local-nvme
  size: 500Gi

cache:
  pools:
    metadata:
      sizeBytes: 5368709120         # 5 GiB
    rowgroup:
      dramSizeBytes: 60129542144    # ~56 GiB
      nvmeSizeBytes: 536870912000   # 500 GiB
  admission:
    sizeThresholdMiB: 1024
    pinnedBypass: true
    model:
      enabled: false  # v1 ships size-threshold only. [ADR-0003]
      s3Uri: s3://penpencil-shelf-prod-config/admission-model.onnx
      maxAgeHours: 48
  pinList:
    s3Uri: s3://penpencil-shelf-prod-config/pin_list.json
    reloadIntervalSeconds: 900

origin:
  bucket: penpencil-cdp-prod
  region: ap-south-1
  pool:
    maxConnections: 256
    idleTimeoutSeconds: 60

trino:
  namespace: trino-db
  coordinatorPodLabels:
    app: trino
    component: coordinator
  workerPodLabels:
    app: trino
    component: worker

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

priorityClass:
  create: true
  value: 100000

nodeSelector:
  workload: shelf

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: shelf
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: shelf

logging:
  level: info
