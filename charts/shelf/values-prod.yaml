# Production overlay — penpencil rep-2 EKS cluster.
#
# Source of sizing: post-cutover post-mortem 2026-04-27 (shelf-2 OOM-killed
# 5x in 1h with the previous 22 GiB DRAM target inside a 32 GiB pod).
# See runbook  shelfd/docs/runbooks/2026-04-shelf-2-oom.md.
#
# Sizing budget (per pod):
#   pod.limits.memory                  = 32 GiB
#   - cache.pools.metadata.sizeBytes   =  5 GiB
#   - cache.pools.rowgroup.dramSizeBytes = 14 GiB
#   = headroom                         = 13 GiB  (Rust runtime, S3 in-flight
#                                                 response buffers up to
#                                                 max_inflight × ~32 MiB,
#                                                 NVMe write-back, tokio task
#                                                 stacks, jemalloc fragmentation)
#
# Hot data still fits in DRAM at this size (current peak working set is
# ~11 GiB during steady state, ~28 GiB only during burst when buffers
# inflate); cold byte-ranges spill to NVMe. Bump dramSizeBytes ONLY in
# lockstep with resources.limits.memory using the formula above.

replicaCount: 3

image:
  repository: registry.gitlab.com/penpencil-services/data/data-engineering/ranger/shelfd
  pullPolicy: IfNotPresent
  # CI pins to an immutable digest-based tag per release.
  # 0.1.0-preview-3 ships SHELF-E1b — LRU eviction in the hybrid
  # row-group pool so NVMe (`shelf_disk_bytes_used`) actually fills
  # under one-shot BI workloads. Multi-arch (amd64+arm64), built on
  # rust:slim-trixie with the matching cc-debian13 runtime so glibc
  # versions agree. See
  #   shelfd/docs/design-notes/SHELF-E1-eviction-audit.md
  tag: "0.1.0-preview-3"

serviceAccount:
  create: false
  # rep-2 currently shares Alluxio's IRSA SA so S3 reads inherit the
  # already-validated `data-platform-alluxio-role`. Set create:true and
  # supply your own `eks.amazonaws.com/role-arn` annotation here when
  # the dedicated `shelf-prod-s3` role is provisioned.
  name: alluxio-sa

resources:
  requests:
    cpu: "4"
    memory: "24Gi"
  limits:
    cpu: "8"
    memory: "32Gi"

storage:
  storageClassName: local-nvme
  size: 240Gi

cache:
  pools:
    metadata:
      sizeBytes: 5368709120          # 5 GiB
    rowgroup:
      # SHELF-E1b — LRU so every memory eviction flows through to
      # NVMe. Under S3-FIFO (the previous default) `shelf_disk_bytes_used`
      # stayed at zero for hours of live traffic on rep-2 because
      # one-shot Metabase reads were filtered out of the small queue
      # before earning promotion.
      evictionPolicy: lru
      dramSizeBytes: 15032385536     # 14 GiB  (was 22 GiB → OOM)
      nvmeSizeBytes: 257698037760    # 240 GiB; matches storage.size
  admission:
    sizeThresholdMiB: 1024
    pinnedBypass: true
    model:
      enabled: false
      s3Uri: s3://penpencil-cdp-temp/shelf/admission-model.onnx
      maxAgeHours: 48
  pinList:
    s3Uri: s3://penpencil-cdp-temp/shelf/pin_list.json
    reloadIntervalSeconds: 900

origin:
  bucket: penpencil-cdp-gold
  region: ap-south-1
  pool:
    # Each in-flight S3 GET buffers up to one Parquet rowgroup (~32 MiB
    # typical, ~256 MiB for the largest file in cdp.* per origin metrics).
    # 256 × 32 MiB = 8 GiB worst-case in-flight burst — already accounted
    # for in the 13 GiB headroom above.
    maxConnections: 256
    idleTimeoutSeconds: 60

trino:
  namespace: trino-db
  coordinatorPodLabels:
    app: trino
    component: coordinator
  workerPodLabels:
    app: trino
    component: worker

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

priorityClass:
  create: true
  value: 100000

# rep-2 shelf pods currently land on the alluxio node-pool (no
# dedicated `workload=shelf` taint yet). Leave nodeSelector empty
# until the dedicated pool ships, otherwise the StatefulSet stays
# Pending after a `helm upgrade`.
nodeSelector: {}

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: shelf
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: shelf

logging:
  level: info
