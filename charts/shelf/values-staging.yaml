# Staging overlay — 3-pod StatefulSet, reduced NVMe, canary admission.
#
# Target: staging EKS cluster (mirrors rep-2 shape). Runs chaos drills.

replicaCount: 3

image:
  pullPolicy: IfNotPresent
  # Pin to a specific tag in your release pipeline.
  tag: "0.1.0"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/shelf-staging-s3

resources:
  requests:
    cpu: "4"
    memory: "24Gi"
  limits:
    cpu: "8"
    memory: "32Gi"

storage:
  storageClassName: ebs-gp3-wffc
  size: 200Gi

cache:
  pools:
    metadata:
      sizeBytes: 2147483648         # 2 GiB
    rowgroup:
      dramSizeBytes: 17179869184    # 16 GiB
      nvmeSizeBytes: 214748364800   # 200 GiB (matches storage.size)
  admission:
    model:
      enabled: false
      s3Uri: s3://penpencil-shelf-staging-config/admission-model.onnx
  pinList:
    s3Uri: s3://penpencil-shelf-staging-config/pin_list.json

origin:
  bucket: penpencil-cdp-staging
  region: ap-south-1

trino:
  namespace: trino-db-staging

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

priorityClass:
  create: true
  value: 100000

nodeSelector:
  workload: shelf

logging:
  level: info
