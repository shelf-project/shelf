# cdp_shelf.properties — Shelf-fronted Iceberg catalog for the bench fixture.
#
# Identical to cdp.properties in every dimension except s3.endpoint, which
# points at the in-namespace shelfd S3-compat shim (port 9092). This is
# the apples-to-apples A/B against cdp.
#
# Two non-default settings are intentional:
#   1. iceberg.metadata-cache.enabled=false  →  forces every metadata
#      read through shelfd so the metadata-pool hit ratio actually climbs
#      cold→warm. Trino's JVM-local MemoryFileSystemCache shadows shelfd
#      otherwise; the metadata pool stays at ~0% hit ratio in prod logs
#      until this knob flips (workspace AGENTS.md, "Iceberg gotcha" line
#      May 1 + the rep-1 SHELF-25 prod incident).
#   2. s3.max-connections=256             →  matches rep-1 cost-neutral
#      tuning MR !17967 (May 1) — surfaced as one of the highest-leverage
#      tuning knobs on the shelf-fronted catalog at production scale.
#
# Operators MUST replace the placeholders below at `up.sh` time:
#   ${HMS_THRIFT_URI}      thrift://hive-metastore-host:9083
#   ${BENCH_BUCKET}        s3://your-tpcds-bench-bucket

connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=${HMS_THRIFT_URI}
iceberg.file-format=PARQUET

# In-cluster Shelf shim. The Service shelf-bench is rendered by the chart
# as the headless StatefulSet's pool service (ADR-0012, SHELF-22).
fs.native-s3.enabled=true
s3.endpoint=http://shelf-bench.trino-bench.svc.cluster.local:9092
s3.path-style-access=true
s3.region=us-east-1

# Bench-specific tuning — see header.
iceberg.metadata-cache.enabled=false
s3.max-connections=256
iceberg.dynamic-filtering.wait-timeout=3s
parquet.small-file-threshold=8MB
s3.tcp-keep-alive=true
