# cdp.properties — raw S3 baseline catalog for the Shelf benchmark fixture.
#
# Bypasses Shelf entirely. Used as the A/B control against cdp_shelf.
# Identical to cdp_shelf in every other dimension (HMS, bucket, scale
# factor, Iceberg fixture) so latency / hit-rate / $/query deltas
# attribute cleanly to Shelf vs raw S3.
#
# Operators MUST replace the placeholders below at `up.sh` time:
#   ${HMS_THRIFT_URI}     thrift://hive-metastore-host:9083
#   ${BENCH_BUCKET}       s3://your-tpcds-bench-bucket
#   ${BENCH_REGION}       e.g. us-east-1, ap-south-1

connector.name=iceberg
iceberg.catalog.type=hive_metastore
hive.metastore.uri=${HMS_THRIFT_URI}
iceberg.file-format=PARQUET

# Raw S3 — direct AWS endpoint, no shelfd hop.
fs.native-s3.enabled=true
s3.endpoint=https://s3.${BENCH_REGION}.amazonaws.com
s3.region=${BENCH_REGION}
s3.path-style-access=false

# Iceberg metadata cache — leave at the Trino default (TRUE) on the
# baseline. The cdp_shelf catalog disables it so that fair-A/B is preserved
# only for cache-effectiveness measurement; the raw-S3 baseline benefits
# from the default to match what an unmodified Trino would do.
iceberg.metadata-cache.enabled=true

# Iceberg dynamic filtering — keep defaults; relevant for the 50.6 % JOIN
# cohort observed on rep-1 (AGENTS.md May 1 workload-distribution bullet).
iceberg.dynamic-filtering.wait-timeout=3s
