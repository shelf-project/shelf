connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.warehouse=s3://iceberg-warehouse/
iceberg.file-format=PARQUET

# Raw-S3 (here, MinIO) baseline catalog. Identical to iceberg.properties
# except s3.endpoint points at MinIO directly, bypassing shelfd entirely.
# Used for the v1 apples-to-apples Shelf-vs-raw-S3 comparison: the same
# REST catalog, same warehouse bucket, same Iceberg fixture — only the
# s3.endpoint differs.
iceberg.metadata-cache.enabled=false

fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.region=us-east-1
