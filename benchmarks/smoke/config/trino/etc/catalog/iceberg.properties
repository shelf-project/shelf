connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.warehouse=s3://iceberg-warehouse/
iceberg.file-format=PARQUET

# Disable the JVM-local Iceberg metadata cache so warm queries
# re-issue their metadata HeadObject/GetObject calls through shelfd.
# In production this would stay on (it's a latency win), but the
# smoke harness needs warm reads to actually reach the shim so the
# `shelf_hits_total` gate has something to measure. Data-plane (row
# group) reads are never served by this cache — they always go back
# to the filesystem.
iceberg.metadata-cache.enabled=false

# SHELF-22 read-path wiring: point Trino's native S3 filesystem at the
# shelfd S3-compat shim (:9092). Trino issues normal HeadObject /
# GetObject(Range) calls; shelfd transparently caches them under the
# same content-addressed keys the native Java plugin uses and falls
# through to MinIO on miss. The catalog never learns shelfd exists;
# the REST catalog still uses the MinIO endpoint directly because it
# needs write access during seed.
fs.native-s3.enabled=true
s3.endpoint=http://shelfd:9092
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.region=us-east-1
