connector.name=tpch

# In-memory TPC-H generator. Used in the smoke harness as the SOURCE
# for `CREATE TABLE iceberg.default.X AS SELECT * FROM tpch.sfN.X` so
# the bench has a real Iceberg fixture (1 GB at SF1, 10 GB at SF10)
# fronted by both `iceberg` (shelf path) and `iceberg_direct` (raw S3
# baseline) catalogs.
tpch.column-naming=STANDARD
